      req.onupgradeneeded = () => req.result.createObjectStore(STORE);
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }

  // ---- ローカル(IndexedDB) ----
  function loadLocal() {
    return (async () => {
      try {
        const db = await open();
        return await new Promise((res) => {
          const tx = db.transaction(STORE, "readonly").objectStore(STORE).get(KEY);
          tx.onsuccess = () => res(tx.result || null);
          tx.onerror = () => res(null);
        });
      } catch (e) { return null; }
    })();
  }
  function saveLocalNow(data) {
    return (async () => {
      try {
        const db = await open();
        db.transaction(STORE, "readwrite").objectStore(STORE).put(JSON.parse(JSON.stringify(data)), KEY);
      } catch (e) { console.warn("local save failed", e); }
    })();
  }

  // ---- クラウド設定 (localStorage) ----
  function getConfig() {
    try { return JSON.parse(localStorage.getItem(CFG_KEY) || "null"); } catch (e) { return null; }
  }
  function setConfig(cfg) {
    if (cfg && cfg.url) localStorage.setItem(CFG_KEY, JSON.stringify({ url: cfg.url, token: cfg.token || "" }));
    else localStorage.removeItem(CFG_KEY);
  }
  function isCloud() { const c = getConfig(); return !!(c && c.url); }

  // ---- クラウド(GAS) 通信 ----
  async function cloudLoad() {
    const c = getConfig();
    if (!c || !c.url) return { ok: false, error: "未設定" };
    try {
      const u = c.url + (c.url.indexOf("?") >= 0 ? "&" : "?") + "token=" + encodeURIComponent(c.token || "");
      const r = await fetch(u, { method: "GET" });
      const j = await r.json();
      if (!j.ok) return { ok: false, error: j.error || "読込失敗" };
      return { ok: true, data: j.data || null };
    } catch (e) { return { ok: false, error: String(e) }; }
  }
  async function cloudSave(data) {
    const c = getConfig();
    if (!c || !c.url) return { ok: false, error: "未設定" };
    try {
      // GASのCORS制約回避のため text/plain で送信（プリフライト回避）
      const r = await fetch(c.url, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        redirect: "follow",
        body: JSON.stringify({ token: c.token || "", data: JSON.parse(JSON.stringify(data)) }),
      });
      const text = await r.text();
      let j;
      try { j = JSON.parse(text); }
      catch (pe) {
        // GASがHTML(ログイン要求やエラーページ)を返した場合
        return { ok: false, error: "サーバが想定外の応答（" + r.status + "）。デプロイの『アクセス:全員』を確認してください。" };
      }
      if (!j.ok) return { ok: false, error: j.error || "保存失敗" };
      return { ok: true, savedAt: j.savedAt };
    } catch (e) { return { ok: false, error: String(e) }; }
  }

  let saveTimer = null;
  return {
    // 起動時の読込: クラウド設定があればクラウド優先、無ければローカル
    async load() {
      if (isCloud()) {
        const res = await cloudLoad();
        if (res.ok) {
          if (res.data) { saveLocalNow(res.data); return res.data; }
          // クラウドが空＝初回。ローカルにデータがあればそれを採用（後で保存される）
          return await loadLocal();
        }
        // クラウド接続失敗 → ローカルキャッシュにフォールバック（オフライン継続）
        console.warn("cloud load failed:", res.error);
      }
      return await loadLocal();
    },
    // 通常保存: ローカル即時 + クラウドへデバウンス送信
    save(data) {
      saveLocalNow(data);
      if (!isCloud()) return;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        const res = await cloudSave(data);
        if (!res.ok) console.warn("cloud save failed:", res.error);
        window.dispatchEvent(new CustomEvent("km-cloud-sync", { detail: res }));
      }, 1200);
    },
    // 設定タブから使う公開API
    getConfig, setConfig, isCloud,
    cloudLoad, cloudSave, loadLocal,
  };
})();

  var TARGET_SHEET = 'xl/worksheets/sheet5.xml'; // 税抜入力用 (三島)

  // J列セル -> 元テンプレのスタイルID（書式を維持するため）
  var CELL_STYLE = {
    J16:'52', J17:'60',
    J19:'53', J20:'53', J21:'53', J22:'53', J23:'53',
    J25:'53', J26:'53',
    J30:'88', J31:'88', J32:'88', J33:'88', J34:'88', J35:'88',
    J36:'88', J37:'88', J38:'88', J39:'88', J40:'88',
    J41:'129',
    J47:'55',
    P4:'47', J11:'51', K11:'121'
  };

  function b64ToU8(b64) {
    var bin = atob(b64);
    var len = bin.length;
    var u8 = new Uint8Array(len);
    for (var i = 0; i < len; i++) u8[i] = bin.charCodeAt(i);
    return u8;
  }

  function setNumCell(xml, ref, val) {
    var s = CELL_STYLE[ref] || '0';
    var num = (val === '' || val == null || !isFinite(val)) ? 0 : val;
    var cell = '<c r="' + ref + '" s="' + s + '"><v>' + num + '</v></c>';
    var re = new RegExp('<c r="' + ref + '"[^>]*?(?:/>|>[\\s\\S]*?</c>)');
    if (re.test(xml)) return xml.replace(re, cell);
    return xml; // 対象セルは必ず存在する前提
  }

  // jValues: { J16:数値, ... } を受け取り、xlsxのUint8Arrayを返す
  window.buildPLExcel = function (jValues) {
    var f = window.fflate;
    var zip = f.unzipSync(b64ToU8(window.PL_TEMPLATE_B64));
    var xml = f.strFromU8(zip[TARGET_SHEET]);
    for (var ref in jValues) {
      if (Object.prototype.hasOwnProperty.call(jValues, ref)) {
        xml = setNumCell(xml, ref, jValues[ref]);
      }
    }
    zip[TARGET_SHEET] = f.strToU8(xml);
    // calcChain を削除（Excelが開く時に再構築。古い数式インデックス由来のエラーを防ぐ）
    delete zip['xl/calcChain.xml'];
    if (zip['xl/_rels/workbook.xml.rels']) {
      var rels = f.strFromU8(zip['xl/_rels/workbook.xml.rels'])
        .replace(/<Relationship [^>]*calcChain[^>]*\/>/g, '');
      zip['xl/_rels/workbook.xml.rels'] = f.strToU8(rels);
    }
    if (zip['[Content_Types].xml']) {
      var ct = f.strFromU8(zip['[Content_Types].xml'])
        .replace(/<Override [^>]*calcChain[^>]*\/>/g, '');
      zip['[Content_Types].xml'] = f.strToU8(ct);
    }
    return f.zipSync(zip, { level: 6 });
  };
})();

(function () {
  var STORE = 'やっぱりステーキ三島店';

  // 会社PLの行ラベル -> FCのJセル（×1000で円換算）。null=参考表示のみ
  // label は前方一致でゆるく照合（空白/記号ゆれ対策で正規化）
  function norm(s) {
    return String(s == null ? '' : s).replace(/[\s　・･\(\)（）]/g, '');
  }

  // セルが数値ならNumber、それ以外（'-'等）は0
  function numOf(v) {
    if (typeof v === 'number') return v;
    if (v == null) return 0;
    var n = Number(String(v).replace(/[, ¥\s]/g, ''));
    return isFinite(n) ? n : 0;
  }

  // 2次元配列(rows[r][c]) と store列index を受け取り、ラベル→値(千円) を引く
  function makeLookup(rows, jcol) {
    return function (label) {
      var target = norm(label);
      for (var r = 0; r < rows.length; r++) {
        // ラベルはA列(0) か B列(1) に入る
        var a = norm(rows[r][0]), b = norm(rows[r][1]);
        if ((a && a.indexOf(target) === 0) || (b && b.indexOf(target) === 0)) {
          return numOf(rows[r][jcol]);
        }
      }
      return null; // 見つからない
    };
  }

  // xlsxのUint8Array → { ok, ym, items:[{cell,label,yen,src}], info:[...], raw:{...} }
  window.parseCompanyPL = function (u8) {
    try {
      var f = window.fflate;
      var zip = f.unzipSync(u8);
      // sharedStrings
      var sst = [];
      if (zip['xl/sharedStrings.xml']) {
        var sx = f.strFromU8(zip['xl/sharedStrings.xml']);
        sst = (sx.match(/<si>[\s\S]*?<\/si>/g) || []).map(function (si) {
          // <t>...</t> を連結（<r>分割対応）
          var ts = si.match(/<t[^>]*>([\s\S]*?)<\/t>/g) || [];
          return ts.map(function (t) {
            return t.replace(/<[^>]+>/g, '')
              .replace(/&amp;/g, '&').replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'");
          }).join('');
        });
      }
      // 最初のworksheetを使う（このPLは1シート）
      var wsPath = null;
      for (var k in zip) { if (/^xl\/worksheets\/sheet\d+\.xml$/.test(k)) { wsPath = k; break; } }
      if (!wsPath) return { ok: false, error: 'シートが見つかりません' };
      var xml = f.strFromU8(zip[wsPath]);

      // セルをパース → rows[rIndex0][cIndex0] = value
      var rows = [];
      // 各<c ...>を個別に走査（自己終了 <c .../> と通常 <c ...>...</c> の両対応）
      var cellRe = /<c\s+r="([A-Z]+)(\d+)"([^>]*?)(?:\/>|>([\s\S]*?)<\/c>)/g;
      var m;
      function colToIdx(col) {
        var n = 0;
        for (var i = 0; i < col.length; i++) n = n * 26 + (col.charCodeAt(i) - 64);
        return n - 1;
      }
      while ((m = cellRe.exec(xml))) {
        var col = m[1], row = parseInt(m[2], 10), attr = m[3] || '', inner = m[4] || '';
        var ri = row - 1, cidx = colToIdx(col);
        var val = null;
        var tMatch = /t="([^"]+)"/.exec(attr);
        var typ = tMatch ? tMatch[1] : '';
        var vM = /<v>([\s\S]*?)<\/v>/.exec(inner);
        if (typ === 's' && vM) val = sst[parseInt(vM[1], 10)];
        else if (typ === 'str' && vM) val = vM[1];
        else if (typ === 'inlineStr') {
          var isM = /<t[^>]*>([\s\S]*?)<\/t>/.exec(inner); val = isM ? isM[1] : '';
        } else if (vM) val = Number(vM[1]);
        if (!rows[ri]) rows[ri] = [];
        rows[ri][cidx] = val;
      }

      // === LD課 収支表フォーマット：三島店は AW列固定・行は固定位置 ===
      // 列インデックス（0始まり）: AW = 48
      function colToIdxLocal(col) {
        var n = 0;
        for (var i = 0; i < col.length; i++) n = n * 26 + (col.charCodeAt(i) - 64);
        return n - 1;
      }
      var jisseki = colToIdxLocal('AW'); // 三島店の実績列（固定）

      // AW4（結合セル）に店名が入っていれば三島であることを確認。無ければAW列既定で続行。
      var hdrName = rows[3] ? rows[3][jisseki] : null; // 4行目 = index 3
      var storeLabel = (typeof hdrName === 'string' && hdrName.replace(/\s/g, '')) ? hdrName : STORE;

      // 行位置（0始まり）で値(千円)を取得。毎月同じ位置である前提。
      function rowVal(rowNo1) { // rowNo1 = 1始まりの行番号
        var rr = rows[rowNo1 - 1];
        return rr ? numOf(rr[jisseki]) : 0;
      }
      function yenOf(rowNo1) { // 千円 → 円
        return Math.round(rowVal(rowNo1) * 1000);
      }

      // --- 会社PL 固定行マップ（LD課フォーマット・千円） ---
      // r11 給与 / r12 福利厚生 / r13 アルバイト
      // r15 施設費計 / r16 広告 / r19 水光熱 / r21 消耗品
      // r28 その他経費計 = SUM(AW16:AW27)（広告・水光熱・消耗品・通信・保険・車両・雑費等を含む）
      var uriage  = yenOf(9);   // r9 総売上高（想定行）
      var kyuyo   = yenOf(11);  // r11 給与 → J30 社員
      var fukuri  = yenOf(12);  // r12 福利厚生 → J32 法定福利
      var baito   = yenOf(13);  // r13 アルバイト → J31 パート
      var shisetsu = yenOf(15); // r15 施設費計（AW15）→ J35算出に使用
      var koukoku = yenOf(16);  // r16 広告 → J38
      var suikou  = yenOf(19);  // r19 水光熱 → J33
      var shomo   = yenOf(21);  // r21 消耗品 → J37
      var sonotaKei = yenOf(28); // r28 その他経費計（AW28）→ J40算出に使用

      var items = [
        { cell: 'J16', label: '売上高（税抜）', yen: uriage, src: 'AW9 総売上高' },
        { cell: 'J30', label: '人件費（社員）', yen: kyuyo, src: 'AW11 給与' },
        { cell: 'J31', label: '人件費（パート）', yen: baito, src: 'AW13 アルバイト' },
        { cell: 'J32', label: '法定福利', yen: fukuri, src: 'AW12 福利厚生' },
        { cell: 'J33', label: '水道光熱費', yen: suikou, src: 'AW19 水光熱' },
        { cell: 'J37', label: '消耗品費', yen: shomo, src: 'AW21 消耗品' },
        { cell: 'J38', label: '広告宣伝費', yen: koukoku, src: 'AW16 広告' },
      ].filter(function (it) { return it.yen != null; });

      // 施設費計・その他経費計は、家賃/ロイヤリティ確定後にJ35/J40を逆算するため raw で返す
      var raw = {
        shisetsuKei: shisetsu,   // AW15 施設費計（円）
        sonotaKei: sonotaKei,    // AW28 その他経費計（円）
      };

      // 参考表示（FCに自動反映しない）
      var info = [
        { label: '施設費計(AW15)', yen: shisetsu },
        { label: 'その他経費計(AW28)', yen: sonotaKei },
        { label: '本社費(AW33)', yen: yenOf(33) },
        { label: '営業利益(AW35)', yen: yenOf(35) },
        { label: '経常利益(AW37)', yen: yenOf(37) },
      ].filter(function (it) { return it.yen != null; });

      // 対象月（タイトル行 or シート名から推定）
      var ym = '';
      var scanText = '';
      for (var rr = 0; rr < Math.min(rows.length, 6); rr++) {
        if (!rows[rr]) continue;
        for (var cc2 = 0; cc2 < Math.min(rows[rr].length, 6); cc2++) {
          if (typeof rows[rr][cc2] === 'string') scanText += rows[rr][cc2] + ' ';
        }
      }
      var ymM = /(\d{4})\s*年\s*(\d{1,2})\s*月/.exec(scanText);
      if (ymM) ym = ymM[1] + '-' + ('0' + ymM[2]).slice(-2);

      return { ok: true, ym: ym, store: storeLabel, items: items, info: info, raw: raw };
    } catch (e) {
      return { ok: false, error: (e && e.message) ? e.message : String(e) };
    }
  };
})();

</script>
<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;


/* =====================================================================
   経理メイト — 速報フェーズ (日報入力 → 月末着地予測)
   三島店 / FC簡易損益計算書 連動プロトタイプ

   データ層は dataStore 経由に統一。今は localState 実装だが、
   後で Google Apps Script (fetch) に差し替えるだけで Sheets 永続化に移行可能。
   ===================================================================== */

// ---- 店舗マスタ / 標準値 (FCテンプレ準拠・三島店は沼津シートを雛形に編集可) ----
const STANDARD = {
  // FCテンプレートの標準率 (税抜)
  rate: {
    genka: 0.405,     // 売上原価
    niku: 0.3056,     // 肉仕入
    kome: 0.0122,     // 米仕入
    yasai: 0.0387,    // 野菜等
    chomi: 0.0387,    // 調味料
    inryo: 0.0102,    // 飲料水
    royalty: 0.05,    // ロイヤリティ
    suidou: 0.05,     // 水道光熱費
    eigyo: 0.0641,    // 営業利益 標準率
  },
};

// 仕入区分 (FCテンプレの原価項目)
const GENKA_CATS = [
  ["niku", "肉仕入"],
  ["kome", "米仕入"],
  ["yasai", "野菜等"],
  ["chomi", "調味料"],
  ["inryo", "飲料水"],
];

// 三島店 既定設定 (月初に確認・編集)
const DEFAULT_SETTINGS = {
  storeName: "三島店",
  company: "株式会社ｈｉｌｌｓ",
  businessDays: 30,       // 当月営業日数
  prevSales: 0,           // 前月売上(税抜・円)
  planSales: 0,           // 計画売上(円)
  // 固定費 (月額・税抜・円)
  rent: 0,                // 家賃
  depreciation: 0,        // 減価償却費
  loanRepay: 0,           // 借入元金返済
  royaltyRate: 0.05,      // ロイヤリティ率
  royaltyFixed: 0,        // ロイヤリティ確定額(DS請求書・税抜・円)。会社PL取込時のJ36に使用
  fixedLabor: 0,          // 社員給与(固定)
  partRate: 7500,         // アルバイト1人当たり日額(概算・円)
  // 想定原価率 (空なら標準率を使用)
  assumedGenkaRate: "",
  taxRate: 0.08,          // 軽減税率(税込売上→税抜換算用)
};

// 業者(取引先)マスタ 初期例。cat は GENKA_CATS のキー。
const DEFAULT_VENDORS = [
  { id: 1, name: "（例）○○精肉", cat: "niku" },
  { id: 2, name: "（例）△△青果", cat: "yasai" },
];

// ---- データ抽象層 (Sheets差し替えポイント) ----
const dataStore = {
  load() {
    // GAS版: return fetch(GAS_URL + "?action=load").then(r=>r.json())
    return null; // localStorage非対応環境のためメモリ運用
  },
  save() {
    // GAS版: fetch(GAS_URL, {method:"POST", body: JSON.stringify({action:"save", ...})})
  },
};

const yen = (n) =>
  isFinite(n) ? "¥" + Math.round(n).toLocaleString("ja-JP") : "—";
const pct = (n) => (isFinite(n) ? (n * 100).toFixed(1) + "%" : "—");
const todayStr = () => new Date().toISOString().slice(0, 10);

// ---- エアメイトCSV列インデックス ----
const AM = { store: 1, date: 2, dow: 3, sales: 5, target: 6, lastSales: 9, guests: 29, perGuest: 41 };

// cp932(Shift-JIS) を含むCSVを安全に読む。fileは File オブジェクト。
function readAirmateCSV(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("ファイルを読めませんでした"));
    reader.onload = () => {
      try {
        const buf = new Uint8Array(reader.result);
        // まずUTF-8で試し、文字化け(\uFFFD)が多ければShift_JISで再デコード
        let text = new TextDecoder("utf-8").decode(buf);
        if ((text.match(/\uFFFD/g) || []).length > 3) {
          text = new TextDecoder("shift_jis").decode(buf);
        }
        resolve(parseCSVText(text));
      } catch (e) {
        reject(e);
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

// CSVテキスト → 行配列(ダブルクォート対応)
function splitCSV(text) {
  const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
  return lines.map((line) => {
    const out = []; let cur = ""; let q = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (q) {
        if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
        else if (ch === '"') q = false;
        else cur += ch;
      } else {
        if (ch === '"') q = true;
        else if (ch === ",") { out.push(cur); cur = ""; }
        else cur += ch;
      }
    }
    out.push(cur);
    return out;
  });
}

const csvNum = (s) => Number(String(s == null ? "" : s).replace(/[, ¥\s]/g, "")) || 0;

// 形式を自動判別して日次データに変換
// 形式A: 日次サマリ(横長・1行目ヘッダに「日付」列、店舗ごと1日1行)
// 形式B: 日別売上月報(上部メタ + 「月日」始まりヘッダ + 合計行)
function parseCSVText(text) {
  const rows = splitCSV(text).filter((r) => r.some((c) => c && c.length));
  // ヘッダ行を探す
  const headerA = rows.findIndex((r) => r.includes("日付"));
  const headerB = rows.findIndex((r) => r[0] && r[0].trim() === "月日");
  let data;
  if (headerB !== -1) data = parseMonthlyReport(rows, headerB);
  else if (headerA !== -1) data = parseDailySummary(rows, headerA);
  else throw new Error("対応するヘッダ（「日付」または「月日」）が見つかりません");
  // 未来日ガード: 今日より後の日付は実績が存在しないため除外
  const today = todayStr();
  return data.filter((d) => d.date && d.date <= today);
}

// 形式A: 日次サマリ
function parseDailySummary(rows, hidx) {
  const data = [];
  for (let i = hidx + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[AM.date]) continue;
    data.push({
      date: normDate(r[AM.date].trim()),
      dow: (r[AM.dow] || "").trim(),
      store: (r[AM.store] || "").trim(),
      sales: csvNum(r[AM.sales]),
      target: csvNum(r[AM.target]),
      lastSales: csvNum(r[AM.lastSales]),
      guests: csvNum(r[AM.guests]),
      perGuest: csvNum(r[AM.perGuest]),
    });
  }
  return data;
}

// 形式B: 日別売上月報
function parseMonthlyReport(rows, hidx) {
  // 対象年月をメタ行から取得（「作成日」等の他の日付を誤って拾わないよう対象年月行に限定）
  let year = "", month = "";
  for (let i = 0; i < hidx; i++) {
    const s = rows[i].join(" ");
    if (s.indexOf("対象年月") === -1) continue;
    const m = s.match(/(\d{4})年\s*(\d{1,2})月/);
    if (m) { year = m[1]; month = m[2].padStart(2, "0"); break; }
  }
  if (!year) {
    throw new Error("「対象年月」が読み取れませんでした。ファイル上部のメタ情報をご確認ください");
  }
  const head = rows[hidx];
  const col = (name) => head.findIndex((h) => (h || "").trim() === name);
  const cSales = col("売上金額"), cTarget = col("売上目標"), cLast = col("昨年売上"),
    cGuests = col("客数"), cPer = col("客単価");
  const data = [];
  let curMonth = month;
  for (let i = hidx + 1; i < rows.length; i++) {
    const r = rows[i];
    const c0 = (r[0] || "").trim();
    if (!c0) continue;
    if (c0.startsWith("合計") || c0.startsWith("累積") || c0.startsWith("目標達成")) break;
    const md = c0.match(/(?:(\d{1,2})月)?\s*(\d{1,2})日(?:\(([^)]*)\))?/);
    if (!md) continue;
    const mo = (md[1] || curMonth).padStart(2, "0"); curMonth = mo;
    const day = md[2].padStart(2, "0");
    const sales = csvNum(r[cSales]);
    if (sales === 0) continue; // 未来日・売上0はスキップ
    data.push({
      date: `${year}-${mo}-${day}`,
      dow: md[3] || "",
      store: "",
      sales,
      target: cTarget >= 0 ? csvNum(r[cTarget]) : 0,
      lastSales: cLast >= 0 ? csvNum(r[cLast]) : 0,
      guests: cGuests >= 0 ? csvNum(r[cGuests]) : 0,
      perGuest: cPer >= 0 ? csvNum(r[cPer]) : 0,
    });
  }
  return data;
}

// 日付正規化: "2026/6/1" や "2026年06月01日" → "2026-06-01"
function normDate(s) {
  const m = s.match(/(\d{4})[-/年.](\d{1,2})[-/月.](\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2, "0")}-${m[3].padStart(2, "0")}`;
  return s;
}

const ymOf = (d) => (d || "").slice(0, 7);   // "2026-06"
const yOf = (d) => (d || "").slice(0, 4);    // "2026"
// "YYYY-MM" に n ヶ月加算した "YYYY-MM" を返す（棚卸の翌月繰越などに使用）
const ymPlus = (ym, n) => {
  const m = /^(\d{4})-(\d{2})$/.exec(ym || "");
  if (!m) return ym;
  const base = (parseInt(m[1], 10) * 12 + (parseInt(m[2], 10) - 1)) + (Number(n) || 0);
  const y = Math.floor(base / 12);
  const mo = (base % 12) + 1;
  return y + "-" + ("0" + mo).slice(-2);
};
const WEEKDAY_JP = ["日", "月", "火", "水", "木", "金", "土"];

// ---- 天気 (Open-Meteo 無料API・キー不要) ----
// 三島市の緯度経度。16時(JST)の天気を取得。
const MISHIMA = { lat: 35.1188, lon: 138.9189 };
// WMO weather_code → 日本語
const WMO = {
  0: "快晴", 1: "晴れ", 2: "薄曇り", 3: "曇り",
  45: "霧", 48: "霧氷",
  51: "霧雨(弱)", 53: "霧雨", 55: "霧雨(強)",
  56: "着氷性霧雨", 57: "着氷性霧雨(強)",
  61: "雨(弱)", 63: "雨", 65: "雨(強)",
  66: "みぞれ", 67: "みぞれ(強)",
  71: "雪(弱)", 73: "雪", 75: "雪(強)", 77: "霧雪",
  80: "にわか雨(弱)", 81: "にわか雨", 82: "にわか雨(激)",
  85: "にわか雪(弱)", 86: "にわか雪(強)",
  95: "雷雨", 96: "雷雨(雹)", 99: "雷雨(激しい雹)",
};
function wmoText(code) {
  return WMO[code] != null ? WMO[code] : "不明";
}
// 指定日(YYYY-MM-DD)の16時の天気を取得。過去数日〜当日に対応。
async function fetchWeather16(dateStr) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${MISHIMA.lat}&longitude=${MISHIMA.lon}` +
    `&hourly=temperature_2m,weather_code&timezone=Asia%2FTokyo&past_days=7&forecast_days=2`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("天気サービスに接続できません");
  const data = await res.json();
  const times = data.hourly && data.hourly.time;
  if (!times) throw new Error("天気データを取得できません");
  const target = `${dateStr}T16:00`;
  const idx = times.indexOf(target);
  if (idx === -1) throw new Error("対象日時の天気が見つかりません（範囲外）");
  const code = data.hourly.weather_code[idx];
  const temp = data.hourly.temperature_2m[idx];
  return `${wmoText(code)} ${Math.round(temp)}℃`;
}

// 日報の税抜売上 = 税込売上 − 内税消費税8% − 内税消費税10%
// 旧データ(tax8/tax10 のみ, salesIncTax/salesExTaxManual)も後方互換で計算
function exSalesOf(r) {
  if (r.salesInc != null && r.salesInc !== "") {
    return (Number(r.salesInc) || 0) - (Number(r.tax8) || 0) - (Number(r.tax10) || 0);
  }
  // 旧: 消費税額からの逆算方式
  if (r.tax8 != null || r.tax10 != null) {
    return (Number(r.tax8) || 0) / 0.08 + (Number(r.tax10) || 0) / 0.10;
  }
  // 最旧: 税込/税抜手入力
  const inc = (Number(r.salesIncTax) || 0) / 1.08;
  const man = Number(r.salesExTaxManual) || 0;
  return inc + man;
}

// 売上が実際に入力されているか（速報の集計対象判定に使う）。
// salesInc / tax / 旧方式のいずれかに有効値があれば「入力済み」とみなす。
function hasSalesEntered(r) {
  if (r.salesInc != null && r.salesInc !== "") return true;
  if ((r.tax8 != null && r.tax8 !== "") || (r.tax10 != null && r.tax10 !== "")) return true;
  if (r.salesIncTax != null && r.salesIncTax !== "") return true;
  if (r.salesExTaxManual != null && r.salesExTaxManual !== "") return true;
  return false;
}

// 替え肉券の集計期間：毎月18日配布のため「19日〜翌月18日」を1か月とする。
// 指定日 date が属する集計期間のキー（締め月 = 18日が属する暦月）を返す。
// 例: 2026-06-19〜2026-07-18 → キー "2026-07"
function meatPeriodKey(dateStr) {
  const y = Number((dateStr || "").slice(0, 4));
  const m = Number((dateStr || "").slice(5, 7));
  const d = Number((dateStr || "").slice(8, 10));
  if (!y || !m || !d) return "";
  // 19日以降は翌月の期間に属する
  let py = y, pm = m;
  if (d >= 19) {
    pm += 1;
    if (pm > 12) { pm = 1; py += 1; }
  }
  return `${py}-${String(pm).padStart(2, "0")}`;
}

function App() {
  const [tab, setTab] = useState("dash");
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [vendors, setVendors] = useState(DEFAULT_VENDORS);
  const [reports, setReports] = useState([]); // 日報リスト
  const [history, setHistory] = useState([]); // エアメイト取込日次データ(当年+前年)
  const [targets, setTargets] = useState({ daily: {}, monthly: {}, yearly: {} }); // 手入力目標
  const [confirms, setConfirms] = useState({}); // 月次突合の確定値 { "2026-05": { J16:数値, ... , _done:bool } }
  const [dashYM, setDashYM] = useState(""); // 速報タブの表示対象月（空=最新月）

  // ---- ブラウザ保存(IndexedDB) からの復元 / 自動保存 ----
  const [loaded, setLoaded] = React.useState(false);
  React.useEffect(() => {
    (async () => {
      const d = await KMStore.load();
      if (d) {
        if (d.settings) setSettings(d.settings);
        if (d.vendors) setVendors(d.vendors);
        if (d.reports) setReports(d.reports);
        if (d.history) setHistory(d.history);
        if (d.targets) setTargets(d.targets);
        if (d.confirms) setConfirms(d.confirms);
      }
      setLoaded(true);
    })();
  }, []);
  React.useEffect(() => {
    if (!loaded) return;
    KMStore.save({ settings, vendors, reports, history, targets, confirms });
  }, [loaded, settings, vendors, reports, history, targets, confirms]);

  // number入力欄でホイール/タッチパッドのスクロール中に値が変わるのを防ぐ
  React.useEffect(() => {
    const onWheel = (e) => {
      const el = document.activeElement;
      if (el && el.tagName === "INPUT" && el.type === "number" && el === e.target) {
        el.blur(); // フォーカスを外してスクロールはそのまま通す
      }
    };
    document.addEventListener("wheel", onWheel, { passive: true });
    return () => document.removeEventListener("wheel", onWheel);
  }, []);

  // 日報入力フォーム
  const [form, setForm] = useState({
    date: todayStr(),
    salesInc: "",      // 税込売上(円)
    tax8: "",          // 内税の消費税額8%(円)
    tax10: "",         // 内税の消費税額10%(円)
    guests: "",        // 客数
    partCount: "",     // アルバイト人数(当日) → 概算人件費 = 人数 × 設定の日額
    meatTickets: "",   // 替え肉券(枚数) ※P/Lには流し込まない
    weather: "",       // 天気(16時・三島市) 自動取得 or 手入力
    note: "",          // 備考・特記事項
    buys: {},          // { vendorId: 金額 } 納品書ごと
  });

  // ---- 集計 ----
  const vendorMap = useMemo(() => {
    const m = {};
    for (const v of vendors) m[v.id] = v;
    return m;
  }, [vendors]);

  const calc = useMemo(() => {
    // 表示対象月。dashYM 指定があればそれ、無ければ日報の最新月（無ければ今日）
    const latest = reports.length
      ? reports.reduce((mx, r) => (r.date > mx ? r.date : mx), reports[0].date)
      : todayStr();
    const curYM = dashYM || ymOf(latest);

    // ③ 速報は「税込売上が入力済み」の日報のみを対象にする。
    //   売上を入力した日報がそのまま反映される（日付の前日判定は行わない）。
    //   売上未入力の日報（客数や替え肉券だけ等）は反映しない。
    const monthReports = reports.filter((r) => {
      if (ymOf(r.date) !== curYM) return false;
      if (!hasSalesEntered(r)) return false;     // 売上未入力は除外
      return true;
    });
    const days = monthReports.length;

    let salesEx = 0, salesInc = 0, guests = 0, partCount = 0, cashGenka = 0;
    const genkaParts = { niku: 0, kome: 0, yasai: 0, chomi: 0, inryo: 0 };
    // ① 曜日別集計（税込売上・客数）。0=日 .. 6=土
    const dow = Array.from({ length: 7 }, () => ({ inc: 0, guests: 0, n: 0 }));
    for (const r of monthReports) {
      salesEx += exSalesOf(r);
      salesInc += Number(r.salesInc) || 0;
      guests += Number(r.guests) || 0;
      partCount += Number(r.partCount) || 0;
      for (const [vid, amt] of Object.entries(r.buys || {})) {
        const v = vendorMap[vid] || vendorMap[Number(vid)];
        const val = Number(amt) || 0;
        cashGenka += val;
        if (v && genkaParts[v.cat] != null) genkaParts[v.cat] += val;
      }
      // 曜日別（売上入力済みの日のみ＝monthReports内なので確定）
      const dt = new Date(r.date + "T00:00:00");
      const w = dt.getDay();
      if (!isNaN(w)) {
        dow[w].inc += Number(r.salesInc) || 0;
        dow[w].guests += Number(r.guests) || 0;
        dow[w].n += 1;
      }
    }
    // 曜日別平均（n日で割る）
    const dowAvg = dow.map((x, i) => ({
      w: i,
      avgInc: x.n > 0 ? x.inc / x.n : 0,
      avgGuests: x.n > 0 ? x.guests / x.n : 0,
      n: x.n,
    }));

    // ② 替え肉券は「19日〜翌月18日」を1か月として集計（毎月18日配布）。
    //   表示対象は curYM を締め月とする期間。枚数は売上入力の有無に関わらず数える。
    let meatTickets = 0;
    for (const r of reports) {
      if (meatPeriodKey(r.date) !== curYM) continue;
      meatTickets += Number(r.meatTickets) || 0;
    }
    // 替え肉券の集計期間の表示用ラベル（19日〜翌18日）
    const mpY = Number(curYM.slice(0, 4)), mpM = Number(curYM.slice(5, 7));
    let sY = mpY, sM = mpM - 1;
    if (sM < 1) { sM = 12; sY -= 1; }
    const meatPeriodLabel = `${sY}/${String(sM).padStart(2, "0")}/19〜${mpY}/${String(mpM).padStart(2, "0")}/18`;

    // 前年同月（取込CSV history を参照）。当月の経過日数ぶんだけ比較するため、
    // 前年同月の「同じ日までの累計」を取る（例: 当月12日まで → 前年も1〜12日）。
    const prevYM = `${Number(curYM.slice(0, 4)) - 1}${curYM.slice(4)}`;
    const maxDay = monthReports.reduce((mx, r) => {
      const d = Number((r.date || "").slice(8, 10));
      return d > mx ? d : mx;
    }, 0);
    let pyGuests = 0, pySalesInc = 0, pyDays = 0;
    for (const h of history) {
      if (ymOf(h.date) !== prevYM) continue;
      const d = Number((h.date || "").slice(8, 10));
      if (maxDay > 0 && d > maxDay) continue; // 当月の経過日数までに揃える
      pyGuests += Number(h.guests) || 0;
      pySalesInc += Number(h.sales) || 0; // CSVの売上は税込
      pyDays++;
    }
    const hasPY = pyDays > 0;

    // 客単価(税込) = 税込売上 / 客数
    const perInc = guests > 0 ? salesInc / guests : 0;
    const pyPerInc = pyGuests > 0 ? pySalesInc / pyGuests : 0;

    // 原価率 = 累計仕入(現金仕入) / 税抜売上
    const genkaRateActual = salesEx > 0 ? cashGenka / salesEx : 0;
    // 概算人件費率 = (社員給与日割り + バイト人件費) / 税抜売上
    // バイト人件費 = 延べアルバイト人数 × 1人当たり日額(設定)
    const bizDays = Number(settings.businessDays) || days || 1;
    const partRate = Number(settings.partRate) || 0;
    const partLabor = partCount * partRate;
    const empLaborToDate = (Number(settings.fixedLabor) || 0) * (days / bizDays);
    const laborToDate = empLaborToDate + partLabor;
    const laborRate = salesEx > 0 ? laborToDate / salesEx : 0;

    // ---- 売上目標 達成度（税込基準）----
    // 当月目標 = 月別目標(手入力) があればそれ、無ければ当月の日別目標の合計
    let monthTarget = 0;
    const mt = targets.monthly && targets.monthly[curYM];
    if (mt != null && mt !== "") {
      monthTarget = Number(mt) || 0;
    } else if (targets.daily) {
      for (const [d, v] of Object.entries(targets.daily)) {
        if (ymOf(d) === curYM && v !== "" && v != null) monthTarget += Number(v) || 0;
      }
    }
    // 当月累計 達成度 = 税込売上 / 当月目標
    const achieveMonth = monthTarget > 0 ? salesInc / monthTarget : null;
    // 本日までの想定到達 = 当月目標 × (経過営業日 / 当月営業日数)
    const paceTarget = monthTarget > 0 ? monthTarget * (days / bizDays) : 0;
    const achievePace = paceTarget > 0 ? salesInc / paceTarget : null;
    // 本日(最新日)の日別目標と達成度
    const latestDate = monthReports.reduce((mx, r) => (r.date > mx ? r.date : mx), monthReports[0] ? monthReports[0].date : "");
    const todayTargetRaw = targets.daily && targets.daily[latestDate];
    const todayTarget = todayTargetRaw != null && todayTargetRaw !== "" ? Number(todayTargetRaw) : 0;
    const todaySalesInc = latestDate
      ? (Number((monthReports.find((r) => r.date === latestDate) || {}).salesInc) || 0)
      : 0;
    const achieveToday = todayTarget > 0 ? todaySalesInc / todayTarget : null;

    return {
      curYM, days, bizDays,
      salesInc, salesEx, guests, meatTickets, cashGenka, partCount, partLabor,
      perInc,
      genkaParts,
      dowAvg, meatPeriodLabel,
      genkaRateActual, laborRate, laborToDate,
      // 目標達成度
      monthTarget, achieveMonth, paceTarget, achievePace,
      latestDate, todayTarget, todaySalesInc, achieveToday,
      // 前年比較
      hasPY,
      salesIncYoY: hasPY && pySalesInc > 0 ? salesInc / pySalesInc : null,
      salesIncDeltaPY: hasPY ? salesInc - pySalesInc : null,
      pySalesInc: hasPY ? pySalesInc : null,
      guestsDeltaPY: hasPY ? guests - pyGuests : null,
      perIncDeltaPY: hasPY && pyPerInc > 0 ? perInc - pyPerInc : null,
      pyGuests: hasPY ? pyGuests : null,
      pyPerInc: hasPY ? pyPerInc : null,
      progress: bizDays > 0 ? days / bizDays : 0,
    };
  }, [reports, settings, vendorMap, history, targets, dashYM]);

  const addReport = () => {
    // 入力された項目があるか（空欄は既存値を保持してマージ）
    const filled = ["salesInc", "tax8", "tax10", "guests", "partCount", "meatTickets", "weather", "note"]
      .some((k) => form[k] !== "" && form[k] != null);
    const hasBuys = Object.values(form.buys || {}).some((v) => v !== "" && v != null);
    if (!filled && !hasBuys) return;

    setReports((p) => {
      const existing = p.find((r) => r.date === form.date) || {};
      // 入力された項目だけ上書き。空欄は既存値を維持。
      const merged = { ...existing, date: form.date };
      for (const k of ["salesInc", "tax8", "tax10", "guests", "partCount", "meatTickets", "weather", "note"]) {
        if (form[k] !== "" && form[k] != null) merged[k] = form[k];
      }
      // 納品書は業者ごとにマージ（入力された業者だけ更新）
      const mergedBuys = { ...(existing.buys || {}) };
      for (const [vid, val] of Object.entries(form.buys || {})) {
        if (val !== "" && val != null) mergedBuys[vid] = val;
      }
      merged.buys = mergedBuys;
      return [...p.filter((r) => r.date !== form.date), merged].sort((a, b) =>
        a.date < b.date ? -1 : 1
      );
    });
    setForm((f) => ({
      ...f, salesInc: "", tax8: "", tax10: "", guests: "",
      partCount: "", meatTickets: "", weather: "", note: "", buys: {},
    }));
    setTab("dash");
  };

  return (
    <div className="km-root">
      <style>{CSS}</style>
      <header className="km-head">
        <div className="km-brand">
          <span className="km-mark">経</span>
          <div>
            <div className="km-title">経理メイト</div>
            <div className="km-sub">速報フェーズ · {settings.storeName}</div>
          </div>
        </div>
        <nav className="km-nav">
          {[["dash", "速報"], ["entry", "日報入力"], ["yoy", "前年比較"], ["goals", "目標設定"], ["recon", "月次突合"], ["log", "日報一覧"], ["vendor", "業者"], ["set", "設定"]].map(
            ([k, label]) => (
              <button
                key={k}
                className={"km-navbtn" + (tab === k ? " on" : "")}
                onClick={() => setTab(k)}
              >
                {label}
              </button>
            )
          )}
        </nav>
      </header>

      <main className="km-main">
        {tab === "dash" && <Dash calc={calc} settings={settings} reports={reports} dashYM={dashYM} setDashYM={setDashYM} />}
        {tab === "entry" && (
          <Entry form={form} setForm={setForm} addReport={addReport} settings={settings} vendors={vendors} reports={reports} />
        )}
        {tab === "yoy" && (
          <YoY history={history} setHistory={setHistory} targets={targets} setTargets={setTargets} reports={reports} setReports={setReports} />
        )}
        {tab === "goals" && <Goals targets={targets} setTargets={setTargets} history={history} reports={reports} />}
        {tab === "recon" && <Reconcile calc={calc} settings={settings} reports={reports} vendors={vendors} vendorMap={vendorMap} confirms={confirms} setConfirms={setConfirms} />}
        {tab === "log" && <Log reports={reports} setReports={setReports} settings={settings} vendorMap={vendorMap} />}
        {tab === "vendor" && <Vendors vendors={vendors} setVendors={setVendors} />}
        {tab === "set" && (
          <Settings
            settings={settings} setSettings={setSettings}
            vendors={vendors} setVendors={setVendors}
            reports={reports} setReports={setReports}
            history={history} setHistory={setHistory}
            targets={targets} setTargets={setTargets}
            confirms={confirms} setConfirms={setConfirms}
          />
        )}
      </main>
      <footer className="km-foot">
        データはこのセッション内に保持されます。Google Sheets連携時は dataStore を GAS に差し替えます。
      </footer>
    </div>
  );
}

// ============================== 速報ダッシュボード ==============================
function Dash({ calc, settings, reports, dashYM, setDashYM }) {
  const c = calc;
  const std = STANDARD.rate;

  // 日報のある月一覧（新しい順）
  const months = React.useMemo(() => {
    const set = new Set((reports || []).map((r) => ymOf(r.date)));
    return Array.from(set).sort().reverse();
  }, [reports]);
  const latestYM = months[0] || "";
  const selectedYM = dashYM || latestYM;

  const monthPicker = months.length > 0 && (
    <div className="km-row km-stats" style={{ marginBottom: 14, alignItems: "center" }}>
      <span className="km-label" style={{ margin: 0 }}>表示する月</span>
      <select
        className="km-select"
        value={selectedYM}
        onChange={(e) => setDashYM(e.target.value === latestYM ? "" : e.target.value)}
      >
        {months.map((m) => (
          <option key={m} value={m}>{m.replace("-", "年") + "月"}{m === latestYM ? "（最新）" : ""}</option>
        ))}
      </select>
      {dashYM && dashYM !== latestYM && (
        <button className="km-btn" onClick={() => setDashYM("")}>最新月へ戻る</button>
      )}
    </div>
  );

  if (c.days === 0)
    return (
      <div className="km-page">
        {monthPicker}
        <Empty
          title={selectedYM ? selectedYM.replace("-", "年") + "月の日報がありません" : "まだ日報がありません"}
          body="「日報入力」から売上を記録すると、その月の累計・速報がここに表示されます。"
        />
      </div>
    );

  const ymLabel = c.curYM ? c.curYM.replace("-", "年") + "月" : "";
  const isPast = latestYM && c.curYM && c.curYM < latestYM;

  return (
    <div className="km-page">
      {monthPicker}
      <div className="km-row">
        <div className="km-card hero">
          <div className="km-label">{ymLabel} {isPast ? "月間累計" : "当月累計"} · 税込売上 {isPast && <span className="km-cellref">確定月</span>}</div>
          <div className="km-big pos">{yen(c.salesInc)}</div>
          <div className="km-herometa">
            税抜 {yen(c.salesEx)} ／ 客数 {c.guests.toLocaleString()}人
            {c.salesIncYoY != null && (
              <span className="km-vs">
                前年比 {yoyTxt(c.salesIncYoY)}（{deltaYen(c.salesIncDeltaPY)}）
              </span>
            )}
          </div>
          <div className="km-progress">
            <div className="km-progress-bar" style={{ width: pct(c.progress) }} />
          </div>
          <div className="km-progress-meta">
            {isPast ? "営業" : "進捗"} {c.days} / {c.bizDays} 営業日
            {c.monthTarget > 0 && (
              <span className="km-vs">
                {isPast ? "月間目標" : "当月目標"} {yen(c.monthTarget)} ／ 達成 {pct(c.achieveMonth)}
              </span>
            )}
          </div>
        </div>
      </div>

      {c.monthTarget > 0 ? (
        <div className="km-row km-stats">
          <Stat
            label="当月 目標達成度"
            value={pct(c.achieveMonth)}
            sub={`目標 ${yen(c.monthTarget)}`}
            cls={c.achieveMonth >= 1 ? "pos" : "neg"}
          />
          <Stat
            label="ペース比（本日まで）"
            value={c.achievePace != null ? pct(c.achievePace) : "—"}
            sub={`想定到達 ${yen(c.paceTarget)}`}
            cls={c.achievePace >= 1 ? "pos" : "neg"}
          />
          <Stat
            label="本日 達成度"
            value={c.achieveToday != null ? pct(c.achieveToday) : "—"}
            sub={c.todayTarget > 0 ? `${c.latestDate} 目標 ${yen(c.todayTarget)}` : "本日目標 未設定"}
            cls={c.achieveToday != null ? (c.achieveToday >= 1 ? "pos" : "neg") : "dim"}
          />
          <Stat
            label="目標まで残り"
            value={yen(Math.max(c.monthTarget - c.salesInc, 0))}
            sub={`当月目標 − 累計`}
          />
        </div>
      ) : (
        <div className="km-row">
          <div className="km-card" style={{ flex: 1 }}>
            <div className="km-note" style={{ margin: 0 }}>
              当月（{ymLabel}）の売上目標が未設定です。「目標設定」タブで月別または日別の目標を入力すると、ここに達成度が表示されます。
            </div>
          </div>
        </div>
      )}

      <div className="km-row km-stats">
        <Stat label="当月累計 税込売上" value={yen(c.salesInc)} />
        <Stat
          label="税込売上 前年比"
          value={c.salesIncYoY != null ? yoyTxt(c.salesIncYoY) : "—"}
          sub={c.hasPY ? `前年 ${yen(c.pySalesInc)}` : "前年CSV未取込"}
          cls={c.salesIncYoY != null ? yoyCls(c.salesIncYoY) : "dim"}
        />
        <Stat
          label="税込売上 前年差"
          value={c.salesIncDeltaPY != null ? deltaYen(c.salesIncDeltaPY) : "—"}
          sub={c.hasPY ? "当月経過分で比較" : "前年CSV未取込"}
          cls={c.salesIncDeltaPY != null ? deltaCls(c.salesIncDeltaPY) : "dim"}
        />
        <Stat label="当月累計 税抜売上" value={yen(c.salesEx)} />
      </div>

      <div className="km-row km-stats">
        <Stat label="当月累計 客数" value={c.guests.toLocaleString() + " 人"} />
        <Stat
          label="客数 対前年増減"
          value={c.guestsDeltaPY != null ? deltaNum(c.guestsDeltaPY, "人") : "—"}
          sub={c.hasPY ? `前年 ${c.pyGuests.toLocaleString()}人` : "前年CSV未取込"}
          cls={c.guestsDeltaPY != null ? deltaCls(c.guestsDeltaPY) : "dim"}
        />
        <Stat label="累計 税込客単価" value={yen(c.perInc)} sub={`税込売上÷客数`} />
        <Stat
          label="税込客単価 対前年増減"
          value={c.perIncDeltaPY != null ? deltaYen(c.perIncDeltaPY) : "—"}
          sub={c.hasPY ? `前年 ${yen(c.pyPerInc)}` : "前年CSV未取込"}
          cls={c.perIncDeltaPY != null ? deltaCls(c.perIncDeltaPY) : "dim"}
        />
      </div>

      <div className="km-row km-stats">
        <Stat
          label="原価率"
          value={pct(c.genkaRateActual)}
          sub={`仕入 ${yen(c.cashGenka)} ÷ 税抜`}
          cls={c.genkaRateActual > std.genka ? "neg" : "pos"}
        />
        <Stat
          label="概算 人件費率"
          value={pct(c.laborRate)}
          sub={`延べ${c.partCount}人＋社員 ÷ 税抜`}
        />

// 曜日別平均グラフ（税込売上＝棒、客数＝折れ線）。外部ライブラリ不要のインラインSVG。
function DowChart({ dowAvg }) {
  const labels = ["日", "月", "火", "水", "木", "金", "土"];
  const W = 700, H = 240, padL = 56, padR = 48, padT = 16, padB = 36;
  const iw = W - padL - padR, ih = H - padT - padB;
  const maxInc = Math.max(...dowAvg.map((d) => d.avgInc), 1);
  const maxG = Math.max(...dowAvg.map((d) => d.avgGuests), 1);
  const bw = iw / 7;
  const x = (i) => padL + bw * i + bw * 0.18;
  const barW = bw * 0.64;
  const yInc = (v) => padT + ih - (v / maxInc) * ih;
  const yG = (v) => padT + ih - (v / maxG) * ih;
  const cx = (i) => padL + bw * i + bw * 0.5;
  const linePts = dowAvg.map((d, i) => `${cx(i)},${yG(d.avgGuests)}`).join(" ");
  const hasData = dowAvg.some((d) => d.n > 0);
  if (!hasData) return <div className="km-note">まだ集計できる日報がありません。</div>;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="km-dowchart" style={{ width: "100%", height: "auto" }}>
      {/* 横グリッド */}
      {[0.25, 0.5, 0.75, 1].map((f) => (
        <line key={f} x1={padL} x2={W - padR} y1={padT + ih - f * ih} y2={padT + ih - f * ih}
          stroke="var(--line)" strokeWidth="1" strokeDasharray="3 3" />
      ))}
      {/* 売上の目盛（左） */}
      {[0, 0.5, 1].map((f) => (
        <text key={f} x={padL - 8} y={padT + ih - f * ih + 4} textAnchor="end"
          fontSize="10" fill="var(--dim)">{Math.round((maxInc * f) / 1000)}k</text>
      ))}
      {/* 客数の目盛（右） */}
      {[0, 0.5, 1].map((f) => (
        <text key={f} x={W - padR + 8} y={padT + ih - f * ih + 4} textAnchor="start"
          fontSize="10" fill="var(--gold)">{Math.round(maxG * f)}</text>
      ))}
      {/* 棒（平均税込売上） */}
      {dowAvg.map((d, i) => (
        <g key={i}>
          <rect x={x(i)} y={yInc(d.avgInc)} width={barW} height={Math.max(0, padT + ih - yInc(d.avgInc))}
            rx="3" fill="var(--accent)" opacity={d.n > 0 ? 0.85 : 0.2}>
            <title>{labels[i]}曜：平均売上 {yen(d.avgInc)} ／ 平均客数 {Math.round(d.avgGuests)}人（{d.n}日）</title>
          </rect>
          {/* 棒の上に平均売上 */}
          {d.n > 0 && (
            <text x={cx(i)} y={yInc(d.avgInc) - 5} textAnchor="middle" fontSize="10"
              fill="var(--ink)" fontWeight="600">{Math.round(d.avgInc / 1000)}k</text>
          )}
          <text x={cx(i)} y={H - padB + 18} textAnchor="middle" fontSize="12"
            fill="var(--ink)" fontWeight="600">{labels[i]}<tspan fontSize="9" fill="var(--dim)" fontWeight="400">({d.n})</tspan></text>
        </g>
      ))}
      {/* 折れ線（平均客数） */}
      <polyline points={linePts} fill="none" stroke="var(--gold)" strokeWidth="2.5"
        strokeLinejoin="round" strokeLinecap="round" />
      {dowAvg.map((d, i) => (
        <g key={"g" + i}>
          <circle cx={cx(i)} cy={yG(d.avgGuests)} r={d.n > 0 ? 3.5 : 0} fill="var(--gold)">
            <title>{labels[i]}曜：平均客数 {Math.round(d.avgGuests)}人 ／ 平均売上 {yen(d.avgInc)}（{d.n}日）</title>
          </circle>
          {/* 客数値 */}
          {d.n > 0 && (
            <text x={cx(i)} y={yG(d.avgGuests) - 8} textAnchor="middle" fontSize="9"
              fill="var(--gold)" fontWeight="600">{Math.round(d.avgGuests)}</text>
          )}
        </g>
      ))}
    </svg>
  );
}

// ============================== 日報入力 ==============================
function Entry({ form, setForm, addReport, settings, vendors, reports }) {
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const setBuy = (vid) => (e) =>
    setForm((f) => ({ ...f, buys: { ...f.buys, [vid]: e.target.value } }));
  const [wxBusy, setWxBusy] = useState(false);
  const [wxErr, setWxErr] = useState("");
  const getWeather = async () => {
    setWxBusy(true); setWxErr("");
    try {
      const w = await fetchWeather16(form.date);
      setForm((f) => ({ ...f, weather: w }));
    } catch (e) {
      setWxErr(e.message + "（手入力してください）");
    } finally {
      setWxBusy(false);
    }
  };
  const salesInc = Number(form.salesInc) || 0;
  const t8 = Number(form.tax8) || 0;
  const t10 = Number(form.tax10) || 0;
  const totalEx = salesInc - t8 - t10;
  const catName = Object.fromEntries(GENKA_CATS);

  // 選択中の日付に既存データがあるか
  const existing = (reports || []).find((r) => r.date === form.date) || null;
  // プレースホルダ表示用: 既存値があれば薄く出す（未入力なら維持される）
  const ph = (k, suffix = "") => {
    if (existing && existing[k] != null && existing[k] !== "")
      return `現在 ${Number(existing[k]).toLocaleString()}${suffix}`;
    return "0";
  };
  const loadExisting = () => {
    if (!existing) return;
    setForm((f) => ({
      ...f,
      salesInc: existing.salesInc ?? "",
      tax8: existing.tax8 ?? "",
      tax10: existing.tax10 ?? "",
      guests: existing.guests ?? "",
      partCount: existing.partCount ?? "",
      meatTickets: existing.meatTickets ?? "",
      weather: existing.weather ?? "",
      note: existing.note ?? "",
      buys: { ...(existing.buys || {}) },
    }));
  };

  // 当月(入力中の日付の年月)の替え肉券 累計。入力中の値も加味して表示。
  const ym = ymOf(form.date);
  // 替え肉券の累計は集計期間（19日〜翌18日）で数える
  const meatPK = meatPeriodKey(form.date);
  const meatThisMonth = (reports || [])
    .filter((r) => meatPeriodKey(r.date) === meatPK && r.date !== form.date)
    .reduce((s, r) => s + (Number(r.meatTickets) || 0), 0);
  const meatWithToday = meatThisMonth + (Number(form.meatTickets) || 0);

  return (
    <div className="km-page">
      <div className="km-card">
        <div className="km-cardhead">日報入力</div>
        <Field label="日付">
          <input type="date" value={form.date} onChange={set("date")} />
        </Field>
        {existing && (
          <div className="km-existing">
            この日付には既に記録があります。<b>入力した項目だけ更新</b>され、空欄の項目は今の値が残ります。
            <button className="km-loadbtn" onClick={loadExisting}>既存の値を読み込んで編集</button>
          </div>
        )}

        <div className="km-subhead">売上（税抜 = 税込 − 消費税8% − 消費税10%）</div>
        <div className="km-form">
          <Field label="税込売上（円）">
            <input type="number" placeholder={ph("salesInc")} value={form.salesInc} onChange={set("salesInc")} />
          </Field>
          <Field label="内税 消費税額10%（円）">
            <input type="number" placeholder={ph("tax10")} value={form.tax10} onChange={set("tax10")} />
          </Field>
          <Field label="内税 消費税額8%（円）">
            <input type="number" placeholder={ph("tax8")} value={form.tax8} onChange={set("tax8")} />
          </Field>
          <Field label="客数（人）">
            <input type="number" placeholder={ph("guests", "人")} value={form.guests} onChange={set("guests")} />
          </Field>
        </div>
        {salesInc > 0 && (
          <div className="km-total">本日 税抜売上 <b>{yen(totalEx)}</b>
            <span className="km-total-sub">（税込 {yen(salesInc)} − 8% {yen(t8)} − 10% {yen(t10)}）</span>
          </div>
        )}

        <div className="km-subhead">人件費</div>
        <div className="km-form">
          <Field label="アルバイト人数（人）" hint={`1人 ${yen(Number(settings.partRate) || 0)}/日で概算（設定で変更可）`}>
            <input type="number" placeholder={ph("partCount", "人")} value={form.partCount} onChange={set("partCount")} />
          </Field>
        </div>

        <div className="km-subhead">替え肉券</div>
        <div className="km-form">
          <Field label="替え肉券（枚）" hint={`期間累計（19〜翌18日） ${meatWithToday.toLocaleString()} 枚（P/L非反映）`}>
            <input type="number" placeholder={ph("meatTickets", "枚")} value={form.meatTickets} onChange={set("meatTickets")} />
          </Field>
        </div>

        <div className="km-subhead">納品書入力（業者ごと）</div>
        {vendors.length === 0 ? (
          <div className="km-note">「業者」タブで取引先を登録すると、ここに入力欄が出ます。</div>
        ) : (
          <div className="km-form">
            {vendors.map((v) => {
              const cur = existing && existing.buys ? existing.buys[v.id] : null;
              const phBuy = cur != null && cur !== "" ? `現在 ${Number(cur).toLocaleString()}` : "0";
              return (
                <Field key={v.id} label={v.name} hint={`→ ${catName[v.cat] || "未分類"}`}>
                  <input type="number" placeholder={phBuy} value={form.buys[v.id] || ""} onChange={setBuy(v.id)} />
                </Field>
              );
            })}
          </div>
        )}

        <div className="km-subhead">天気・備考</div>
        <div className="km-form">
          <Field label="天気（16時・三島市）" hint="ボタンで自動取得、手入力も可">
            <div className="km-wx-row">
              <input type="text" placeholder={existing && existing.weather ? `現在 ${existing.weather}` : "例: 晴れ 24℃"}
                value={form.weather} onChange={set("weather")} />
              <button type="button" className="km-wx-btn" onClick={getWeather} disabled={wxBusy}>
                {wxBusy ? "取得中…" : "自動取得"}
              </button>
            </div>
          </Field>
        </div>
        {wxErr && <div className="km-wx-err">{wxErr}</div>}
        <div className="km-form">
          <Field label="備考・特記事項">
            <textarea className="km-textarea" rows={3}
              placeholder={existing && existing.note ? `現在: ${existing.note}` : "イベント、クレーム、設備不具合、近隣状況など"}
              value={form.note} onChange={set("note")} />
          </Field>
        </div>

        <button className="km-primary" onClick={addReport}>
          {existing ? "この日報を更新（入力項目のみ）" : "この日報を記録"}
        </button>
        <div className="km-note">入力した項目だけ保存され、空欄の項目は既存の値が残ります。営業中に仕入だけ、閉店後に売上だけ、と分けて入力できます。</div>
      </div>
    </div>
  );
}
