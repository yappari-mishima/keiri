// ============================== 業者マスタ ==============================
function Vendors({ vendors, setVendors }) {
  const [name, setName] = useState("");
  const [cat, setCat] = useState("niku");
  const add = () => {
    if (!name.trim()) return;
    const id = (vendors.reduce((m, v) => Math.max(m, v.id), 0) || 0) + 1;
    setVendors((p) => [...p, { id, name: name.trim(), cat }]);
    setName("");
  };
  const setVCat = (id) => (e) =>
    setVendors((p) => p.map((v) => (v.id === id ? { ...v, cat: e.target.value } : v)));
  const setVName = (id) => (e) =>
    setVendors((p) => p.map((v) => (v.id === id ? { ...v, name: e.target.value } : v)));
  const del = (id) => setVendors((p) => p.filter((v) => v.id !== id));
  return (
    <div className="km-page">
      <div className="km-card">
        <div className="km-cardhead">業者（取引先）マスタ</div>
        <div className="km-note" style={{ marginTop: 0, marginBottom: 14 }}>
          納品書を発行する業者を登録し、それぞれを仕入区分（肉/米/野菜/調味料/飲料）に紐付けます。
          日報では業者ごとに金額を入れるだけで、自動で区分集計されます。
        </div>
        <div className="km-vrow km-vadd">
          <input className="km-vname" placeholder="業者名（例: ○○精肉店）" value={name}
            onChange={(e) => setName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} />
          <select value={cat} onChange={(e) => setCat(e.target.value)}>
            {GENKA_CATS.map(([k, l]) => <option key={k} value={k}>{l}</option>)}
          </select>
          <button className="km-add" onClick={add}>追加</button>
        </div>
        <div className="km-vlist">
          {vendors.map((v) => (
            <div className="km-vrow" key={v.id}>
              <input className="km-vname-edit" value={v.name} onChange={setVName(v.id)} placeholder="業者名" />
              <select value={v.cat} onChange={setVCat(v.id)}>
                {GENKA_CATS.map(([k, l]) => <option key={k} value={k}>{l}</option>)}
              </select>
              <button className="km-del" onClick={() => del(v.id)}>削除</button>
            </div>
          ))}
          {vendors.length === 0 && <div className="km-note">業者が未登録です。</div>}
        </div>
      </div>
    </div>
  );
}

// ============================== 日報一覧 ==============================
function Log({ reports, setReports, settings, vendorMap }) {
  const [month, setMonth] = useState("all");
  if (reports.length === 0)
    return <Empty title="日報がありません" body="「日報入力」から記録を追加してください。" />;
  const del = (date) => setReports((p) => p.filter((r) => r.date !== date));

  // 月リスト（新しい順）
  const months = Array.from(new Set(reports.map((r) => ymOf(r.date)))).sort().reverse();
  const shown = month === "all" ? reports : reports.filter((r) => ymOf(r.date) === month);
  // 表示は新しい順
  const sorted = [...shown].sort((a, b) => (a.date < b.date ? 1 : -1));
  const monthLabel = (ym) => ym.replace("-", "年") + "月";

  // 絞り込み月の合計
  const tot = sorted.reduce((s, r) => {
    s.inc += Number(r.salesInc) || 0;
    s.ex += exSalesOf(r);
    s.g += Number(r.guests) || 0;
    s.buy += Object.values(r.buys || {}).reduce((a, x) => a + (Number(x) || 0), 0);
    s.meat += Number(r.meatTickets) || 0;
    return s;
  }, { inc: 0, ex: 0, g: 0, buy: 0, meat: 0 });

  return (
    <div className="km-page">
      <div className="km-card">
        <div className="km-cardhead-row">
          <div className="km-cardhead">日報一覧（{sorted.length}件）</div>
          <select className="km-monthsel" value={month} onChange={(e) => setMonth(e.target.value)}>
            <option value="all">全期間</option>
            {months.map((m) => <option key={m} value={m}>{monthLabel(m)}</option>)}
          </select>
        </div>
        <div className="km-tablewrap">
          <table className="km-table">
            <thead>
              <tr><th>日付</th><th>曜</th><th className="r">税込売上</th><th className="r">税抜売上</th><th className="r">客数</th><th className="r">客単価</th><th className="r">仕入額</th><th className="r">替え肉券</th><th>天気</th><th>備考</th><th></th></tr>
            </thead>
            <tbody>
              {sorted.map((r) => {
                const inc = (Number(r.salesInc) || 0);
                const ex = exSalesOf(r);
                const g = Number(r.guests) || 0;
                const per = g > 0 ? ex / g : 0;
                const buy = Object.values(r.buys || {}).reduce((s, x) => s + (Number(x) || 0), 0);
                return (
                  <tr key={r.date}>
                    <td className="mono">{r.date}</td>
                    <td className={"mono km-dow km-dow-" + new Date(r.date + "T00:00:00").getDay()}>{["日","月","火","水","木","金","土"][new Date(r.date + "T00:00:00").getDay()]}</td>
                    <td className="r mono">{inc > 0 ? yen(inc) : "—"}</td>
                    <td className="r mono">{yen(ex)}</td>
                    <td className="r mono">{g.toLocaleString()}</td>
                    <td className="r mono">{yen(per)}</td>
                    <td className="r mono">{yen(buy)}</td>
                    <td className="r mono">{(Number(r.meatTickets) || 0).toLocaleString()}</td>
                    <td className="km-wx-cell">{r.weather || ""}</td>
                    <td className="km-note-cell">{r.note || ""}</td>
                    <td className="r"><button className="km-del" onClick={() => del(r.date)}>削除</button></td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr className="em">
                <td>{month === "all" ? "全期間 計" : monthLabel(month) + " 計"}</td>
                <td></td>
                <td className="r mono">{yen(tot.inc)}</td>
                <td className="r mono">{yen(tot.ex)}</td>
                <td className="r mono">{tot.g.toLocaleString()}</td>
                <td className="r mono">{yen(tot.g > 0 ? tot.ex / tot.g : 0)}</td>
                <td className="r mono">{yen(tot.buy)}</td>
                <td className="r mono">{tot.meat.toLocaleString()}</td>
                <td></td>
                <td></td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

// ============================== 目標設定 ==============================
function Goals({ targets, setTargets, history, reports }) {
  const [mode, setMode] = useState("monthly"); // daily / monthly / yearly
  const [calMonth, setCalMonth] = useState(ymOf(todayStr())); // カレンダー対象月
  const [newMonth, setNewMonth] = useState(ymOf(todayStr()));
  const [newYear, setNewYear] = useState(yOf(todayStr()));
  const [avgMsg, setAvgMsg] = useState("");

  const removeKey = (scope, key) => {
    setTargets((t) => {
      const next = { ...t[scope] };
      delete next[key];
      return { ...t, [scope]: next };
    });
  };
  const addKey = (scope, key) => {
    if (!key) return;
    setTargets((t) => (t[scope][key] != null ? t : { ...t, [scope]: { ...t[scope], [key]: "" } }));
  };

  const monthLabel = (ym) => `${Number(ym.slice(0, 4))}年${Number(ym.slice(5, 7))}月`;
  const daysInMonthOf = (ym) => new Date(Number(ym.slice(0, 4)), Number(ym.slice(5, 7)), 0).getDate();
  const dailySumOf = (ym, daily) => {
    let s = 0;
    const n = daysInMonthOf(ym);
    for (let d = 1; d <= n; d++) {
      const v = daily[`${ym}-${String(d).padStart(2, "0")}`];
      if (v != null && v !== "") s += Number(v) || 0;
    }
    return s;
  };

  const setVal = (scope, key) => (e) => {
    const v = e.target.value;
    setTargets((t) => {
      if (scope === "daily") {
        // 日別を編集 → その月の日別合計を月別目標に自動反映
        const nextDaily = { ...t.daily, [key]: v };
        const ym = ymOf(key);
        const sum = dailySumOf(ym, nextDaily);
        return { ...t, daily: nextDaily, monthly: { ...t.monthly, [ym]: sum > 0 ? String(sum) : "" } };
      }
      return { ...t, [scope]: { ...t[scope], [key]: v } };
    });
  };

  // 月別目標を入力 → (入力値 − 現在の日別合計) の差分を全日へ均等加算。端数は最終日で調整。
  const setMonthlyTarget = (ym) => (e) => {
    const raw = e.target.value;
    setTargets((t) => {
      if (raw === "") {
        return { ...t, monthly: { ...t.monthly, [ym]: "" } };
      }
      const targetTotal = Number(raw) || 0;
      const n = daysInMonthOf(ym);
      const curSum = dailySumOf(ym, t.daily);
      const diff = targetTotal - curSum;
      const per = Math.floor(diff / n);
      const remainder = diff - per * n; // 端数(最終日で吸収)
      const nextDaily = { ...t.daily };
      for (let d = 1; d <= n; d++) {
        const dateStr = `${ym}-${String(d).padStart(2, "0")}`;
        const base = Number(nextDaily[dateStr]) || 0;
        let add = per;
        if (d === n) add += remainder; // 端数を最終日に
        const val = base + add;
        nextDaily[dateStr] = String(val);
      }
      // 念のため合計を厳密一致させる
      return { ...t, daily: nextDaily, monthly: { ...t.monthly, [ym]: String(targetTotal) } };
    });
  };

  // 当月日報を history に重ねた前年参照用データ
  const mergedHistory = useMemo(() => {
    const map = {};
    for (const r of (history || [])) map[r.date] = { ...r };
    const repDates = (reports || []).map((r) => r.date).filter(Boolean);
    const curYM = repDates.length ? ymOf(repDates.sort().reverse()[0]) : null;
    for (const r of (reports || [])) {
      if (!r.date) continue;
      if (curYM && ymOf(r.date) !== curYM) continue;
      const inc = Number(r.salesInc) || 0;
      const g = Number(r.guests) || 0;
      if (inc === 0 && g === 0) continue;
      const dow = WEEKDAY_JP[new Date(r.date + "T00:00:00").getDay()];
      map[r.date] = { ...(map[r.date] || {}), date: r.date, sales: inc, guests: g, dow: (map[r.date] && map[r.date].dow) || dow };
    }
    return Object.values(map);
  }, [history, reports]);

  // 前年同月・同曜日の平均売上を、対象月の各日に仮入力
  const fillWeekdayAvg = () => {
    // 前年データを 月+曜日 でグルーピング
    const pyByMonthDow = {};
    for (const h of mergedHistory) {
      const sales = Number(h.sales) || 0;
      if (sales === 0) continue;
      const dow = h.dow || WEEKDAY_JP[new Date(h.date + "T00:00:00").getDay()];
      const key = ymOf(h.date) + "|" + dow;
      (pyByMonthDow[key] = pyByMonthDow[key] || []).push(sales);
    }
    const y = Number(calMonth.slice(0, 4));
    const m = Number(calMonth.slice(5, 7));
    const daysInMonth = new Date(y, m, 0).getDate();
    const prevYM = `${y - 1}-${calMonth.slice(5, 7)}`;
    const next = { ...targets.daily };
    let filled = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${calMonth}-${String(d).padStart(2, "0")}`;
      const dow = WEEKDAY_JP[new Date(dateStr + "T00:00:00").getDay()];
      const arr = pyByMonthDow[prevYM + "|" + dow];
      if (arr && arr.length) {
        next[dateStr] = String(Math.round(arr.reduce((s, x) => s + x, 0) / arr.length));
        filled++;
      }
    }
    setTargets((t) => {
      const sum = dailySumOf(calMonth, next);
      return { ...t, daily: next, monthly: { ...t.monthly, [calMonth]: sum > 0 ? String(sum) : (t.monthly[calMonth] ?? "") } };
    });
    setAvgMsg(filled > 0
      ? `${monthLabel(calMonth)} の ${filled}日分に、前年同月・同曜日の平均を仮入力しました（各マスで上書き可）。月別目標にも合計を反映しました。`
      : `前年同月（${prevYM}）のデータが見つかりませんでした。CSVを取り込むか日報を入力してください。`);
  };

  const monthlyKeys = Object.keys(targets.monthly || {}).sort().reverse();
  const yearlyKeys = Object.keys(targets.yearly || {}).sort().reverse();

  // カレンダー用: 対象月の日付配列（先頭の曜日オフセット込み）
  const calY = Number(calMonth.slice(0, 4));
  const calM = Number(calMonth.slice(5, 7));
  const firstDow = new Date(calY, calM - 1, 1).getDay();
  const daysInCal = new Date(calY, calM, 0).getDate();
  const calCells = [];
  for (let i = 0; i < firstDow; i++) calCells.push(null);
  for (let d = 1; d <= daysInCal; d++) calCells.push(d);
  const shiftMonth = (delta) => {
    const dt = new Date(calY, calM - 1 + delta, 1);
    setCalMonth(`${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}`);
    setAvgMsg("");
  };
  const calMonthTotal = (() => {
    let s = 0;
    for (let d = 1; d <= daysInCal; d++) {
      const v = targets.daily[`${calMonth}-${String(d).padStart(2, "0")}`];
      if (v) s += Number(v) || 0;
    }
    return s;
  })();

  return (
    <div className="km-page">
      <div className="km-card">
        <div className="km-cardhead-row">
          <div className="km-cardhead">売上目標の設定（税込）</div>
          <div className="km-seg">
            {[["daily", "日別"], ["monthly", "月別"], ["yearly", "年間"]].map(([k, l]) => (
              <button key={k} className={"km-segbtn" + (mode === k ? " on" : "")} onClick={() => setMode(k)}>{l}</button>
            ))}
          </div>
        </div>
        <div className="km-note" style={{ marginTop: 0, marginBottom: 14 }}>
          未来の日付・月・年の目標も入力できます。日別目標を入れた月は、その月の目標額として自動合算され、速報の達成度に反映されます（月別を直接入れた場合はそちらが優先）。
        </div>

        {mode === "daily" && (
          <div>
            <div className="km-cal-nav">
              <button className="km-cal-arrow" onClick={() => shiftMonth(-1)}>‹</button>
              <div className="km-cal-month">{monthLabel(calMonth)}</div>
              <button className="km-cal-arrow" onClick={() => shiftMonth(1)}>›</button>
              <span className="km-cal-total">月合計 {yen(calMonthTotal)}</span>
            </div>
            <div className="km-tgt-tools">
              <button className="km-avgbtn" onClick={fillWeekdayAvg}>
                この月に「前年同月・同曜日の平均」を仮入力
              </button>
              <span className="km-tgt-note">各マスで個別に上書きできます</span>
            </div>
            {avgMsg && <div className="km-msg">{avgMsg}</div>}
            <div className="km-cal">
              {["日", "月", "火", "水", "木", "金", "土"].map((w, i) => (
                <div key={w} className={"km-cal-wd" + (i === 0 ? " sun" : i === 6 ? " sat" : "")}>{w}</div>
              ))}
              {calCells.map((d, i) => {
                if (d == null) return <div key={"e" + i} className="km-cal-cell empty" />;
                const dateStr = `${calMonth}-${String(d).padStart(2, "0")}`;
                const dow = new Date(dateStr + "T00:00:00").getDay();
                return (
                  <div key={dateStr} className={"km-cal-cell" + (dow === 0 ? " sun" : dow === 6 ? " sat" : "")}>
                    <div className="km-cal-day">{d}</div>
                    <input className="km-cal-input" type="number" placeholder="0"
                      value={targets.daily[dateStr] ?? ""} onChange={setVal("daily", dateStr)} />
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {mode === "monthly" && (
          <div>
            <div className="km-addrow">
              <input type="month" value={newMonth} onChange={(e) => setNewMonth(e.target.value)} />
              <button className="km-add" onClick={() => addKey("monthly", newMonth)}>この月を追加</button>
            </div>
            {monthlyKeys.length === 0 ? (
              <div className="km-note">月別目標は未設定です。月を追加して金額を入力してください。</div>
            ) : (
              <table className="km-table">
                <thead><tr><th>月</th><th className="r">目標（税込・円）</th><th className="r">日別合計</th><th></th></tr></thead>
                <tbody>
                  {monthlyKeys.map((m) => {
                    const dsum = dailySumOf(m, targets.daily);
                    return (
                      <tr key={m}>
                        <td className="mono nowrap">{monthLabel(m)}</td>
                        <td className="r"><input className="km-tgt" type="number" placeholder="0" value={targets.monthly[m] ?? ""} onChange={setMonthlyTarget(m)} /></td>
                        <td className="r mono dim">{yen(dsum)}</td>
                        <td className="r"><button className="km-del" onClick={() => removeKey("monthly", m)}>削除</button></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
            <div className="km-note">
              月別目標を入力すると、現在の日別合計との差分をその月の全日に均等加算します（端数は月末日で調整）。
              逆に日別カレンダーを編集すると、その月の月別目標は日別合計に自動更新されます。
            </div>
          </div>
        )}

        {mode === "yearly" && (
          <div>
            <div className="km-addrow">
              <input type="number" placeholder="2026" value={newYear} onChange={(e) => setNewYear(e.target.value)} style={{ width: 120 }} />
              <button className="km-add" onClick={() => addKey("yearly", String(newYear))}>この年を追加</button>
            </div>
            {yearlyKeys.length === 0 ? (
              <div className="km-note">年間目標は未設定です。年を追加して金額を入力してください。</div>
            ) : (
              <table className="km-table">
                <thead><tr><th>年</th><th className="r">目標（税込・円）</th><th></th></tr></thead>
                <tbody>
                  {yearlyKeys.map((y) => (
                    <tr key={y}>
                      <td className="mono nowrap">{y}年</td>
                      <td className="r"><input className="km-tgt" type="number" placeholder="0" value={targets.yearly[y] ?? ""} onChange={setVal("yearly", y)} /></td>
                      <td className="r"><button className="km-del" onClick={() => removeKey("yearly", y)}>削除</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ============================== 月次突合 ==============================
// 指定した年月(YYYY-MM)の日報を集計して「概算値」を作る。
// calcは最新月専用なので、突合では任意月を集計できるこの関数を使う。
function aggregateMonth(reports, vendorMap, ym) {
  const mr = reports.filter((r) => ymOf(r.date) === ym);
  let salesEx = 0, salesInc = 0, guests = 0, partCount = 0, laborHours = 0;
  const genkaParts = { niku: 0, kome: 0, yasai: 0, chomi: 0, inryo: 0 };
  const vendorBuys = {}; // { vendorId: 納品書合計 }
  for (const r of mr) {
    salesEx += exSalesOf(r);
    salesInc += Number(r.salesInc) || 0;
    guests += Number(r.guests) || 0;
    partCount += Number(r.partCount) || 0;
    laborHours += Number(r.laborHours) || 0;
    for (const [vid, amt] of Object.entries(r.buys || {})) {
      const v = vendorMap[vid] || vendorMap[Number(vid)];
      const val = Number(amt) || 0;
      vendorBuys[vid] = (vendorBuys[vid] || 0) + val;
      if (v && genkaParts[v.cat] != null) genkaParts[v.cat] += val;
    }
  }
  return { ym, days: mr.length, salesEx, salesInc, guests, partCount, laborHours, genkaParts, vendorBuys };
}

// 業者別の請求確定値(_invoices)を原価区分ごとに集計 → { niku, kome, ... }
// 請求額が無い業者は納品書合計で補完。
function genkaFromInvoices(agg, vendors, invoices) {
  const out = { niku: 0, kome: 0, yasai: 0, chomi: 0, inryo: 0 };
  const inv = invoices || {};
  for (const v of vendors) {
    if (out[v.cat] == null) continue;
    const id = String(v.id);
    const billed = inv[id];
    const val = (billed != null && billed !== "") ? (Number(billed) || 0) : (agg.vendorBuys[id] || 0);
    out[v.cat] += val;
  }
  return out;
}

// 突合する項目の定義。cell=テンプレJ列セル、est=概算値の作り方。
// est(agg, settings) は速報からの概算（無いものは null＝概算なし、確定入力のみ）。
function buildPLItems(agg, settings) {
  const s = settings || {};
  const g = agg.genkaParts;
  const royaltyRate = Number(s.royaltyRate) || 0.05;
  return [
    { cell: "J16", label: "売上高（税抜）", group: "売上", est: Math.round(agg.salesEx) },
    { cell: "J17", label: "前月売上高（税抜）", group: "売上", est: Number(s.prevSales) || null },
    { cell: "J19", label: "肉仕入", group: "原価", est: g.niku || null },
    { cell: "J20", label: "米仕入", group: "原価", est: g.kome || null },
    { cell: "J21", label: "野菜等", group: "原価", est: g.yasai || null },
    { cell: "J22", label: "調味料", group: "原価", est: g.chomi || null },
    { cell: "J23", label: "飲料水", group: "原価", est: g.inryo || null },
    { cell: "J25", label: "月初棚卸高", group: "原価", est: null },
    { cell: "J26", label: "月末棚卸高", group: "原価", est: null },
    { cell: "J30", label: "人件費（社員）", group: "販管費", est: Number(s.fixedLabor) || null },
    { cell: "J31", label: "人件費（パート）", group: "販管費", est: agg.partCount > 0 ? Math.round(agg.partCount * (Number(s.partRate) || 0)) : null },
    { cell: "J32", label: "法定福利", group: "販管費", est: null },
    { cell: "J33", label: "水道光熱費", group: "販管費", est: null },
    { cell: "J34", label: "家賃", group: "販管費", est: Number(s.rent) || null },
    { cell: "J35", label: "減価償却費", group: "販管費", est: Number(s.depreciation) || null },
    { cell: "J36", label: "ロイヤリティ", group: "販管費", est: Math.round(agg.salesEx * royaltyRate) },
    { cell: "J37", label: "消耗品費", group: "販管費", est: null },
    { cell: "J38", label: "広告宣伝費", group: "販管費", est: null },
    { cell: "J39", label: "衛生費", group: "販管費", est: null },
    { cell: "J40", label: "その他", group: "販管費", est: null },
    { cell: "J41", label: "概算消費税", group: "販管費", est: null },
    { cell: "J47", label: "借入元金返済", group: "CF", est: Number(s.loanRepay) || null },
  ];
}

// 営業日数・労働時間・客数（テンプレ上部のP4/J11/K11）
function buildPLMeta(agg, settings) {
  return [
    { cell: "P4", label: "営業日数", est: (Number((settings || {}).businessDays) || agg.days || 0), kind: "int" },
    { cell: "J11", label: "労働時間（時間）", est: agg.laborHours > 0 ? Math.round(agg.laborHours * 100) / 100 : null, kind: "hours" },
    { cell: "K11", label: "売上客数", est: agg.guests || 0, kind: "int" },
  ];
}

function Reconcile({ calc, settings, reports, vendors, vendorMap, confirms, setConfirms }) {
  // 突合対象月。既定 = 日報の最新月の「前月」（締めて請求書が届くのは翌月のため）
  const months = useMemo(() => {
    const set = new Set(reports.map((r) => ymOf(r.date)));
    return Array.from(set).sort().reverse();
  }, [reports]);
  const defaultYM = months[0] || ymOf(todayStr());
  const [ym, setYM] = useState(defaultYM);

  const agg = useMemo(() => aggregateMonth(reports, vendorMap, ym), [reports, vendorMap, ym]);
  const items = useMemo(() => buildPLItems(agg, settings), [agg, settings]);
  const meta = useMemo(() => buildPLMeta(agg, settings), [agg, settings]);

  const cur = confirms[ym] || {};
  const setCell = (cell, val) =>
    setConfirms((p) => {
      const result = { ...p, [ym]: { ...(p[ym] || {}), [cell]: val } };
      // 月末棚卸(J26)を入力したら、翌月の月初棚卸(J25)へ自動繰越（翌月J25が空のときのみ）
      if (cell === "J26" && val != null && val !== "") {
        const nextYM = ymPlus(ym, 1);
        const nm = { ...(result[nextYM] || {}) };
        if (nm.J25 == null || nm.J25 === "") {
          nm.J25 = Number(val) || 0;
          result[nextYM] = nm;
        }
      }
      return result;
    });

  // ---- 業者別 請求額（月締め確定）----
  const invoices = cur._invoices || {};
  const setInvoice = (vid, val) =>
    setConfirms((p) => {
      const prevYM = p[ym] || {};
      const prevInv = prevYM._invoices || {};
      return { ...p, [ym]: { ...prevYM, _invoices: { ...prevInv, [String(vid)]: val } } };
    });

  // 原価業者（カテゴリが原価区分のもの）
  const genkaVendors = useMemo(
    () => vendors.filter((v) => ["niku", "kome", "yasai", "chomi", "inryo"].includes(v.cat)),
    [vendors]
  );
  const catName = Object.fromEntries(GENKA_CATS);

  // ③ 肉仕入は「1〜15日締め」「16〜末日締め」の2回に分かれて請求が来る。
  //   業者別に各期間の納品書合計を出す（前半=日付の日が1〜15、後半=16以降）。
  const vendorBuysByPeriod = useMemo(() => {
    const out = {}; // { vendorId: { first, second } }
    const mr = reports.filter((r) => ymOf(r.date) === ym);
    for (const r of mr) {
      const d = Number((r.date || "").slice(8, 10));
      const half = d <= 15 ? "first" : "second";
      for (const [vid, amt] of Object.entries(r.buys || {})) {
        const v = (out[vid] = out[vid] || { first: 0, second: 0 });
        v[half] += Number(amt) || 0;
      }
    }
    return out;
  }, [reports, ym]);

  // 業者別請求から原価区分集計 → J19〜J23 の確定値ソース
  const invGenka = useMemo(
    () => genkaFromInvoices(agg, genkaVendors, invoices),
    [agg, genkaVendors, invoices]
  );
  // 原価の総合計（全区分の確定値合計）
  const genkaGrandTotal = ["niku", "kome", "yasai", "chomi", "inryo"]
    .reduce((a, cat) => a + (invGenka[cat] || 0), 0);
  const notedGrandTotal = genkaVendors
    .reduce((a, v) => a + (agg.vendorBuys[String(v.id)] || 0), 0);
  // J19〜J23は業者別請求の集計を「確定値」とみなす（cellのcur入力より優先）
  const genkaCellMap = { J19: "niku", J20: "kome", J21: "yasai", J22: "chomi", J23: "inryo" };
  const isGenkaCell = (cell) => genkaCellMap[cell] != null;
  const genkaConfirmOf = (cell) => invGenka[genkaCellMap[cell]] || 0;

  // 確定値（入力があればそれ、無ければ概算で補完）。原価J19〜J23は業者別請求の集計を使う。
  const confirmedOf = (cell, est) => {
    if (isGenkaCell(cell)) return genkaConfirmOf(cell);
    const v = cur[cell];
    if (v != null && v !== "") return Number(v) || 0;
    return est != null ? est : 0;
  };

  // 「概算→確定へコピー」: 概算がある項目の空欄を概算値で埋める
  const fillFromEstimate = () => {
    setConfirms((p) => {
      const next = { ...(p[ym] || {}) };
      for (const it of [...items, ...meta]) {
        if ((next[it.cell] == null || next[it.cell] === "") && it.est != null) {
          next[it.cell] = it.est;
        }
      }
      return { ...p, [ym]: next };
    });
  };

  // 全項目の確定状況（概算ありの項目すべてに確定入力が入ったか）
  const inputCount = [...items, ...meta].filter((it) => cur[it.cell] != null && cur[it.cell] !== "").length;
  const totalCount = items.length + meta.length;

  // ---- Excel出力 ----
  // ---- 会社PL（LD課収支表）取込 ----
  const [plPreview, setPlPreview] = useState(null); // { ym, items, info }
  const [plMsg, setPlMsg] = useState("");
  const onCompanyPL = (e) => {
    const file = (e.target.files || [])[0];
    e.target.value = "";
    if (!file) return;
    setPlMsg("読み込み中…");
    const reader = new FileReader();
    reader.onerror = () => setPlMsg("✗ ファイルを読めませんでした。");
    reader.onload = () => {
      try {
        const u8 = new Uint8Array(reader.result);
        const r = window.parseCompanyPL(u8);
        if (!r.ok) { setPlMsg("✗ 取込失敗: " + (r.error || "")); setPlPreview(null); return; }
        setPlPreview(r);
        setPlMsg(`✓ 「${r.store}」を抽出しました（対象月 ${r.ym || "不明"}）。下の対応表を確認して反映してください。`);
      } catch (err) {
        setPlMsg("✗ 取込失敗: " + (err && err.message ? err.message : String(err)));
        setPlPreview(null);
      }
    };
    reader.readAsArrayBuffer(file);
  };
  const applyCompanyPL = () => {
    if (!plPreview) return;
    const targetYM = plPreview.ym || ym;
    setConfirms((p) => {
      // 既存の確定値（棚卸J25/J26など）は必ず保持したままマージ
      const prev = p[targetYM] || {};
      const next = { ...prev };
      for (const it of plPreview.items) {
        if (it.yen != null) next[it.cell] = it.yen;
      }

      // --- 施設費計・その他経費計から J35 / J40 を算出 ---
      const raw = plPreview.raw || {};
      const num = (v) => (v == null || v === "" ? 0 : Number(v) || 0);

      // 家賃 J34：経理メイト設定を正とする（会社PLには単独項目が無い）
      const rent = Number(settings.rent) || 0;
      if (rent) next.J34 = rent;

      // ロイヤリティ J36：DS請求書の税抜確定値。確定入力があればそれを優先、
      // 無ければ 設定 or 売上×率 で暫定。（会社との突合基準はDS確定値）
      if (next.J36 == null || next.J36 === "") {
        const royaltyRate = Number(settings.royaltyRate) || 0.05;
        const fromSettings = Number(settings.royaltyFixed);
        next.J36 = isFinite(fromSettings) && fromSettings > 0
          ? Math.round(fromSettings)
          : Math.round(num(next.J16) * royaltyRate);
      }

      // J35（減価償却費）= 施設費計(AW15) − 家賃(J34)
      if (raw.shisetsuKei != null) {
        next.J35 = Math.round(raw.shisetsuKei - num(next.J34));
      }

      // J39（衛生費）：会社PLからは取得しない。未入力なら0扱い（算出用）
      const j39 = num(next.J39);

      // J40（その他）= その他経費計(AW28) −（J33+J36+J37+J38+J39）
      //   会社回答により、雑費その他にロイヤリティが含まれるため J36 を減算に含める。
      if (raw.sonotaKei != null) {
        next.J40 = Math.round(
          raw.sonotaKei - (num(next.J33) + num(next.J36) + num(next.J37) + num(next.J38) + j39)
        );
      }

      // J41（概算消費税）：会社PL取込時は0。以降は手入力で上書き可能。
      if (next.J41 == null || next.J41 === "") next.J41 = 0;

      // --- 棚卸の翌月繰越：当月末棚卸(J26) → 翌月初棚卸(J25) を自動反映 ---
      const result = { ...p, [targetYM]: next };
      if (next.J26 != null && next.J26 !== "") {
        const nextYM = ymPlus(targetYM, 1);
        const nm = { ...(result[nextYM] || {}) };
        // 翌月J25が未入力のときのみ自動繰越（手入力を尊重）
        if (nm.J25 == null || nm.J25 === "") {
          nm.J25 = Number(next.J26) || 0;
          result[nextYM] = nm;
        }
      }
      return result;
    });
    if (plPreview.ym && plPreview.ym !== ym) setYM(plPreview.ym);
    setPlMsg(`✓ ${targetYM} の確定欄へ反映しました（会社PLの ${plPreview.items.length} 項目）。`);
    setPlPreview(null);
  };

  const [exMsg, setExMsg] = useState("");
  const doExport = () => {
    try {
      const jv = {};
      for (const it of items) jv[it.cell] = confirmedOf(it.cell, it.est);
      for (const it of meta) {
        let v = confirmedOf(it.cell, it.est);
        // J11(労働時間)は時刻シリアル（日数）でテンプレに格納されている → 時間÷24
        if (it.cell === "J11") v = v / 24;
        jv[it.cell] = v;
      }
      const bytes = window.buildPLExcel(jv);
      const blob = new Blob([bytes], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `FC用簡易損益計算書_三島_${ym.replace("-", "")}.xlsx`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(a.href), 4000);
      setExMsg(`✓ ${ym} の簡易損益計算書を出力しました（テンプレのJ列に確定値を流し込み済み）。`);
    } catch (e) {
      setExMsg("✗ 出力に失敗しました：" + (e && e.message ? e.message : String(e)));
    }
  };

  const diffCls = (est, conf) => {
    if (est == null) return "dim";
    const d = conf - est;
    if (Math.abs(d) < 1) return "pos";
    return Math.abs(d) / Math.max(Math.abs(est), 1) > 0.1 ? "neg" : "";
  };

  const groups = ["売上", "原価", "販管費", "CF"];

  return (
    <div className="km-page">
      <div className="km-card">
        <div className="km-cardhead-row">
          <div className="km-cardhead">月次突合（概算 → 確定）</div>
          <select className="km-select" value={ym} onChange={(e) => setYM(e.target.value)}>
            {(months.length ? months : [defaultYM]).map((m) => (
              <option key={m} value={m}>{m.replace("-", "年") + "月"}</option>
            ))}
          </select>
        </div>
        <div className="km-note" style={{ marginTop: 0 }}>
          請求書が届いた項目の<b>確定値（税抜・円）</b>を入力してください。空欄の項目は出力時に概算値で補完されます。
          確定入力 {inputCount} / {totalCount} 項目。
        </div>

        <div className="km-row km-stats" style={{ marginTop: 14 }}>
          <button className="km-btn" onClick={fillFromEstimate}>↧ 概算値を確定欄へ一括コピー</button>
          <button className="km-btn km-btn-primary" onClick={doExport}>📊 簡易損益計算書を出力（Excel）</button>
        </div>
        {exMsg && <div className="km-msg">{exMsg}</div>}
      </div>

      <div className="km-card">
        <div className="km-cardhead">会社PL（LD課収支表）から取込</div>
        <div className="km-note" style={{ marginTop: 0 }}>
          会社配布のLD課収支表（Excel）を読み込むと、三島店の列（AW列・実績）から売上・人件費・福利・水光熱・消耗品・広告を抽出します。あわせて施設費計(AW15)・その他経費計(AW28)を取得し、反映時に <b>J35 減価償却費 = 施設費計 − 家賃</b>、<b>J40 その他 = その他経費計 −（水光熱+ロイヤリティ+消耗品+広告+衛生費）</b> を自動計算します。ロイヤリティ(J36)はDS請求書の税抜確定値、家賃(J34)は設定値を使用。概算消費税(J41)は取込時0（手入力で上書き可）。原価・棚卸・借入は対象外（日報／設定／手入力）です。
        </div>
        <div className="km-row km-stats" style={{ marginTop: 12 }}>
          <label className="km-btn" style={{ cursor: "pointer", margin: 0 }}>
            📂 会社PL（Excel）を選ぶ
            <input type="file" accept=".xlsx" style={{ display: "none" }} onChange={onCompanyPL} />
          </label>
          {plPreview && (
            <button className="km-btn km-btn-primary" onClick={applyCompanyPL}>
              ↧ {plPreview.ym || ym} の確定欄へ反映
            </button>
          )}
        </div>
        {plMsg && <div className="km-msg">{plMsg}</div>}
        {plPreview && (
          <div className="km-tablewrap" style={{ marginTop: 12 }}>
            <table className="km-table">
              <thead>
                <tr><th>会社PL項目</th><th>→ FC項目</th><th className="r">金額（円）</th></tr>
              </thead>
              <tbody>
                <tr className="em"><td colSpan={3}>反映される項目</td></tr>
                {plPreview.items.map((it) => (
                  <tr key={it.cell}>
                    <td>{it.src}</td>
                    <td>{it.label} <span className="km-cellref">{it.cell}</span></td>
                    <td className="r mono">{yen(it.yen)}</td>
                  </tr>
                ))}
                {plPreview.info && plPreview.info.length > 0 && (
                  <React.Fragment>
                    <tr className="em"><td colSpan={3}>参考（自動反映しません）</td></tr>
                    {plPreview.info.map((it, i) => (
                      <tr key={"info" + i}>
                        <td>{it.label}</td>
                        <td className="dim">—</td>
                        <td className="r mono dim">{yen(it.yen)}</td>
                      </tr>
                    ))}
                  </React.Fragment>
                )}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <div className="km-card">
        <div className="km-cardhead">業者別 突合（納品書 vs 請求書）</div>
        <div className="km-note" style={{ marginTop: 0 }}>
          各業者の<b>納品書合計（日報）</b>と<b>請求額（月締め）</b>を突き合わせます。請求額を入力するとそれが原価の確定値になり、空欄なら納品書合計を採用します。原価区分ごとに集計して上の <b>J19〜J23</b> に自動反映されます。
        </div>
        {genkaVendors.length === 0 ? (
          <div className="km-note">原価区分（肉/米/野菜/調味/飲料）の業者が未登録です。「業者」タブで登録してください。</div>
        ) : (
          <div className="km-tablewrap">
            <table className="km-table">
              <thead>
                <tr>
                  <th>業者</th>
                  <th>区分</th>
                  <th className="r">前半<br/>1〜15日</th>
                  <th className="r">後半<br/>16〜末</th>
                  <th className="r">納品書合計（日報）</th>
                  <th className="r">請求額（月締め）</th>
                  <th className="r">差異</th>
                </tr>
              </thead>
              <tbody>
                {["niku", "kome", "yasai", "chomi", "inryo"].map((cat) => {
                  const vs = genkaVendors.filter((v) => v.cat === cat);
                  if (!vs.length) return null;
                  return (
                    <React.Fragment key={cat}>
                      {vs.map((v) => {
                        const id = String(v.id);
                        const noted = agg.vendorBuys[id] || 0;
                        const per = vendorBuysByPeriod[id] || { first: 0, second: 0 };
                        const billedRaw = invoices[id];
                        const hasBill = billedRaw != null && billedRaw !== "";
                        const billed = hasBill ? (Number(billedRaw) || 0) : null;
                        const diff = billed != null ? billed - noted : null;
                        return (
                          <tr key={id}>
                            <td>{v.name}</td>
                            <td>{catName[v.cat]}</td>
                            <td className="r mono dim">{per.first ? yen(per.first) : "—"}</td>
                            <td className="r mono dim">{per.second ? yen(per.second) : "—"}</td>
                            <td className="r mono">{yen(noted)}</td>
                            <td className="r">
                              <input
                                className="km-numin"
                                type="number"
                                value={hasBill ? billedRaw : ""}
                                placeholder={String(noted)}
                                onChange={(e) => setInvoice(id, e.target.value)}
                              />
                            </td>
                            <td className={"r mono " + (diff == null ? "dim" : (Math.abs(diff) < 1 ? "pos" : (Math.abs(diff) / Math.max(noted, 1) > 0.1 ? "neg" : "")))}>
                              {diff != null ? (diff === 0 ? "0" : (diff > 0 ? "+" : "") + yen(diff)) : "—"}
                            </td>
                          </tr>
                        );
                      })}
                    </React.Fragment>
                  );
                })}
              </tbody>
              <tfoot>
                {["niku", "kome", "yasai", "chomi", "inryo"].map((cat) => {
                  const vs = genkaVendors.filter((v) => v.cat === cat);
                  if (!vs.length) return null;
                  const notedSum = vs.reduce((a, v) => a + (agg.vendorBuys[String(v.id)] || 0), 0);
                  const confSum = invGenka[cat] || 0;
                  const firstSum = vs.reduce((a, v) => a + ((vendorBuysByPeriod[String(v.id)] || {}).first || 0), 0);
                  const secondSum = vs.reduce((a, v) => a + ((vendorBuysByPeriod[String(v.id)] || {}).second || 0), 0);
                  return (
                    <tr className="em" key={"f" + cat}>
                      <td colSpan={2}>{catName[cat]} 計 → 原価確定</td>
                      <td className="r mono dim">{firstSum ? yen(firstSum) : "—"}</td>
                      <td className="r mono dim">{secondSum ? yen(secondSum) : "—"}</td>
                      <td className="r mono">{yen(notedSum)}</td>
                      <td className="r mono">{yen(confSum)}</td>
                      <td className="r mono">{confSum - notedSum === 0 ? "0" : (confSum - notedSum > 0 ? "+" : "") + yen(confSum - notedSum)}</td>
                    </tr>
                  );
                })}
                <tr className="em km-grandtotal">
                  <td colSpan={2}>原価 総合計（J19〜J23）</td>
                  <td className="r mono dim"></td>
                  <td className="r mono dim"></td>
                  <td className="r mono">{yen(notedGrandTotal)}</td>
                  <td className="r mono">{yen(genkaGrandTotal)}</td>
                  <td className="r mono">{genkaGrandTotal - notedGrandTotal === 0 ? "0" : (genkaGrandTotal - notedGrandTotal > 0 ? "+" : "") + yen(genkaGrandTotal - notedGrandTotal)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        )}
        <div className="km-note">
          ※ 請求額の合計が原価（J19〜J23）の確定値になります。日報の納品書（buys）が未入力でも、請求額を直接入れれば原価は確定できます。
        </div>
      </div>

      <div className="km-card">
        <div className="km-cardhead">損益項目</div>
        <div className="km-tablewrap">
          <table className="km-table">
            <thead>
              <tr>
                <th>項目</th>
                <th className="r">概算（速報）</th>
                <th className="r">確定（請求書）</th>
                <th className="r">差異</th>
              </tr>
            </thead>
            <tbody>
              {groups.map((grp) => {
                const rows = items.filter((it) => it.group === grp);
                if (!rows.length) return null;
                return (
                  <React.Fragment key={grp}>
                    <tr className="em"><td colSpan={4}>{grp}</td></tr>
                    {rows.map((it) => {
                      const conf = confirmedOf(it.cell, it.est);
                      const diff = it.est != null ? conf - it.est : null;
                      const genkaAuto = isGenkaCell(it.cell);
                      return (
                        <tr key={it.cell}>
                          <td>{it.label} <span className="km-cellref">{it.cell}</span></td>
                          <td className="r mono">{it.est != null ? yen(it.est) : "—"}</td>
                          <td className="r">
                            {genkaAuto ? (
                              <span className="mono" title="業者別請求の集計（下の業者別突合で入力）">{yen(conf)} <span className="km-cellref">自動</span></span>
                            ) : (
                              <input
                                className="km-numin"
                                type="number"
                                value={cur[it.cell] != null ? cur[it.cell] : ""}
                                placeholder={it.est != null ? String(it.est) : "0"}
                                onChange={(e) => setCell(it.cell, e.target.value)}
                              />
                            )}
                          </td>
                          <td className={"r mono " + diffCls(it.est, conf)}>
                            {diff != null ? (diff === 0 ? "0" : (diff > 0 ? "+" : "") + yen(diff)) : "—"}
                          </td>
                        </tr>
                      );
                    })}
                  </React.Fragment>
                );
              })}
              <tr className="em">
                <td colSpan={4}>営業日数・労働時間・客数</td>
              </tr>
              {meta.map((it) => {
                const conf = confirmedOf(it.cell, it.est);
                const diff = it.est != null ? conf - it.est : null;
                const fmt = (n) => it.kind === "int" ? Math.round(n).toLocaleString() : (Math.round(n * 100) / 100).toLocaleString();
                return (
                  <tr key={it.cell}>
                    <td>{it.label} <span className="km-cellref">{it.cell}</span></td>
                    <td className="r mono">{it.est != null ? fmt(it.est) : "—"}</td>
                    <td className="r">
                      <input
                        className="km-numin"
                        type="number"
                        step={it.kind === "hours" ? "0.25" : "1"}
                        value={cur[it.cell] != null ? cur[it.cell] : ""}
                        placeholder={it.est != null ? String(it.est) : "0"}
                        onChange={(e) => setCell(it.cell, e.target.value)}
                      />
                    </td>
                    <td className={"r mono " + diffCls(it.est, conf)}>
                      {diff != null ? (diff === 0 ? "0" : (diff > 0 ? "+" : "") + fmt(diff)) : "—"}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div className="km-note">
          ※ テンプレ「税抜入力用 (三島)」のJ列に確定値を直接書き込みます。粗利・営業利益・構成比・標準値・差額・キャッシュフローはテンプレ側の数式が自動計算します（数式・他シート参照・書式は保持）。
        </div>
      </div>
    </div>
  );
}

// ============================== 設定 ==============================
function Settings({ settings, setSettings, vendors, setVendors, reports, setReports, history, setHistory, targets, setTargets, confirms, setConfirms }) {
  const set = (k) => (e) =>
    setSettings((s) => ({ ...s, [k]: e.target.value }));

  // ---- バックアップ（エクスポート / インポート）----
  const [bkMsg, setBkMsg] = useState("");
  const SCHEMA = "keiri-mate-backup";
  const VERSION = 1;

  // ---- クラウド連携（Google Sheets / GAS）----
  const _cfg = KMStore.getConfig() || { url: "", token: "" };
  const [cloudUrl, setCloudUrl] = useState(_cfg.url || "");
  const [cloudToken, setCloudToken] = useState(_cfg.token || "");
  const [cloudMsg, setCloudMsg] = useState("");
  const [cloudBusy, setCloudBusy] = useState(false);
  const [syncMsg, setSyncMsg] = useState("");

  useEffect(() => {
    const h = (e) => {
      const r = e.detail || {};
      setSyncMsg(r.ok ? ("✓ クラウド保存済み " + new Date().toLocaleTimeString("ja-JP")) : ("✗ クラウド保存失敗: " + (r.error || "")));
    };
    window.addEventListener("km-cloud-sync", h);
    return () => window.removeEventListener("km-cloud-sync", h);
  }, []);

  function saveCloudConfig() {
    const url = (cloudUrl || "").trim();
    const token = (cloudToken || "").trim();
    if (!url) { KMStore.setConfig(null); setCloudMsg("クラウド連携を無効化しました（ローカル保存のみ）。"); return; }
    if (url.indexOf("https://script.google.com/") !== 0) {
      setCloudMsg("✗ URLが正しくないようです。GASウェブアプリのURL（https://script.google.com/macros/s/.../exec）を貼ってください。");
      return;
    }
    KMStore.setConfig({ url, token });
    setCloudMsg("✓ 設定を保存しました。「接続テスト」で確認してください。");
  }

  async function testCloud() {
    setCloudBusy(true); setCloudMsg("接続中…");
    KMStore.setConfig({ url: (cloudUrl || "").trim(), token: (cloudToken || "").trim() });
    const res = await KMStore.cloudLoad();
    setCloudBusy(false);
    if (res.ok) {
      const d = res.data;
      const n = d && d.reports ? d.reports.length : 0;
      const h = d && d.history ? d.history.length : 0;
      setCloudMsg(`✓ 接続成功。クラウド上のデータ: 日報 ${n}件 / 過去データ ${h}件。${(!d ? "（まだ空です。次回保存時にアップロードされます）" : "")}`);
    } else {
      setCloudMsg("✗ 接続失敗: " + (res.error || "") + "（URL・トークン・デプロイ設定を確認してください）");
    }
  }

  async function pushToCloud() {
    setCloudBusy(true); setCloudMsg("アップロード中…");
    // 画面の状態に依存せず、確実に最新の実データを送るためローカルから読み直す
    let payload = { settings, vendors, reports, history, targets, confirms };
    try {
      const local = await KMStore.loadLocal();
      if (local && (((local.reports || []).length) >= ((reports || []).length))) {
        payload = local;
      }
    } catch (e) { /* ローカル読込に失敗しても画面の値で送る */ }
    const n = (payload.reports || []).length, h = (payload.history || []).length;
    const res = await KMStore.cloudSave(payload);
    setCloudBusy(false);
    setCloudMsg(res.ok
      ? `✓ 現在のデータをクラウドへ保存しました（日報 ${n}件 / 過去データ ${h}件）。`
      : "✗ 保存失敗: " + (res.error || ""));
  }

  async function pullFromCloud() {
    setCloudBusy(true); setCloudMsg("ダウンロード中…");
    const res = await KMStore.cloudLoad();
    setCloudBusy(false);
    if (!res.ok) { setCloudMsg("✗ 取得失敗: " + (res.error || "")); return; }
    if (!res.data) { setCloudMsg("クラウドにデータがありません。"); return; }
    const d = res.data;
    const n = d.reports ? d.reports.length : 0, h = d.history ? d.history.length : 0;
    if (!window.confirm("クラウドのデータ（日報 " + n + "件 / 過去データ " + h + "件）で、このPCの表示を置き換えます。よろしいですか？")) {
      setCloudMsg("取得を中止しました。"); return;
    }
    if (d.settings) setSettings(d.settings);
    if (d.vendors) setVendors(d.vendors);
    if (d.reports) setReports(d.reports);
    if (d.history) setHistory(d.history);
    if (d.targets) setTargets(d.targets);
    if (d.confirms) setConfirms(d.confirms);
    setCloudMsg(`✓ クラウドから取得しました（日報 ${n}件 / 過去データ ${h}件）。`);
  }

  function doExport() {
    try {
      const payload = {
        schema: SCHEMA,
        version: VERSION,
        exportedAt: new Date().toISOString(),
        store: settings.storeName || "三島店",
        data: { settings, vendors, reports, history, targets, confirms },
      };
      const json = JSON.stringify(payload, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
      a.href = url;
      a.download = `経理メイト_${(settings.storeName || "三島店")}_${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      const n = (reports || []).length, h = (history || []).length;
      setBkMsg(`✓ エクスポート完了（日報 ${n}件 / 過去データ ${h}件）。このファイルを別PCに移して取込んでください。`);
    } catch (e) {
      setBkMsg("✗ エクスポートに失敗しました: " + (e.message || e));
    }
  }

  function onImportFile(e) {
    const file = (e.target.files || [])[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      let payload;
      try {
        payload = JSON.parse(reader.result);
      } catch (err) {
        setBkMsg("✗ 読み込み失敗: JSONとして解析できませんでした。");
        return;
      }
      const d = payload && payload.data ? payload.data : payload;
      if (!d || typeof d !== "object" || (!d.settings && !d.reports && !d.history)) {
        setBkMsg("✗ 読み込み失敗: 経理メイトのバックアップファイルではないようです。");
        return;
      }
      const nNew = (d.reports || []).length, hNew = (d.history || []).length;
      const nOld = (reports || []).length, hOld = (history || []).length;
      const ok = window.confirm(
        "バックアップを取り込みます。\n\n" +
        "現在のデータ（日報 " + nOld + "件 / 過去データ " + hOld + "件）は、\n" +
        "取込むデータ（日報 " + nNew + "件 / 過去データ " + hNew + "件）で完全に置き換えられます。\n\n" +
        "よろしいですか？"
      );
      if (!ok) { setBkMsg("取込みを中止しました。"); return; }
      try {
        if (d.settings) setSettings(d.settings);
        if (d.vendors) setVendors(d.vendors);
        if (d.reports) setReports(d.reports);
        if (d.history) setHistory(d.history);
        if (d.targets) setTargets(d.targets);
        if (d.confirms) setConfirms(d.confirms);
        setBkMsg(`✓ 取込完了（日報 ${nNew}件 / 過去データ ${hNew}件）。自動的にこのPCへ保存されます。`);
      } catch (err) {
        setBkMsg("✗ 取込中にエラー: " + (err.message || err));
      }
    };
    reader.onerror = () => setBkMsg("✗ ファイルの読み込みに失敗しました。");
    reader.readAsText(file, "utf-8");
  }

  return (
    <div className="km-page">
      <div className="km-card">
        <div className="km-cardhead">クラウド連携（Google Sheets）</div>
        <div className="km-note" style={{ marginTop: 0 }}>
          Google Apps Script のウェブアプリURLと合言葉（トークン）を設定すると、入力データが自動的にGoogleスプレッドシートへ保存され、別PCでも同じデータを共有できます。
          未設定の場合はこのPCのみ（ローカル保存）で動作します。
        </div>
        <div className="km-form" style={{ marginTop: 10 }}>
          <Field label="ウェブアプリURL" hint="https://script.google.com/macros/s/.../exec">
            <input value={cloudUrl} onChange={(e) => setCloudUrl(e.target.value)} placeholder="https://script.google.com/macros/s/XXXX/exec" />
          </Field>
          <Field label="合言葉（トークン）" hint="GAS側の TOKEN と一致させる">
            <input value={cloudToken} onChange={(e) => setCloudToken(e.target.value)} placeholder="mishima-9f3k-2026" />
          </Field>
        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 12 }}>
          <button className="km-btn km-btn-primary" onClick={saveCloudConfig} disabled={cloudBusy}>💾 設定を保存</button>
          <button className="km-btn" onClick={testCloud} disabled={cloudBusy}>🔌 接続テスト</button>
          <button className="km-btn" onClick={pushToCloud} disabled={cloudBusy}>⬆ このPCのデータをクラウドへ</button>
          <button className="km-btn" onClick={pullFromCloud} disabled={cloudBusy}>⬇ クラウドからこのPCへ</button>
        </div>
        {cloudMsg && <div className="km-note" style={{ marginTop: 12, color: cloudMsg[0] === "✗" ? "#b4413c" : "var(--accent)" }}>{cloudMsg}</div>}
        {syncMsg && <div className="km-note" style={{ marginTop: 6, color: syncMsg[0] === "✗" ? "#b4413c" : "var(--dim)" }}>{syncMsg}</div>}
        <div className="km-note" style={{ marginTop: 12 }}>
          ※ 接続状態: <b>{KMStore.isCloud() ? "クラウド連携 ON" : "ローカルのみ"}</b>。
          連携ONのときは、起動時にクラウドのデータを読み込み、入力するたびに自動で保存します（オフライン時はこのPCに保持し、次回接続時に保存）。
        </div>
      </div>

      <div className="km-card">
        <div className="km-cardhead">データのバックアップ・移行</div>
        <div className="km-note" style={{ marginTop: 0 }}>
          このPC（Edge）に保存されている全データ（設定・業者・日報・過去CSV・目標）を1つのJSONファイルに書き出し、別のPCで取り込めます。
          まずは <b>エクスポート</b> でバックアップを取り、USBやメール等で移したファイルを移行先で <b>インポート</b> してください。
        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 12 }}>
          <button className="km-btn km-btn-primary" onClick={doExport}>📤 エクスポート（バックアップ保存）</button>
          <label className="km-btn" style={{ cursor: "pointer", margin: 0 }}>
            📥 インポート（バックアップ取込）
            <input type="file" accept="application/json,.json" onChange={onImportFile} style={{ display: "none" }} />
          </label>
        </div>
        {bkMsg && <div className="km-note" style={{ marginTop: 12, color: bkMsg[0] === "✗" ? "#b4413c" : "var(--accent)" }}>{bkMsg}</div>}
        <div className="km-note" style={{ marginTop: 12 }}>
          ※ インポートは現在のデータを<b>置き換え</b>ます（追記ではありません）。取込前に念のため現在のデータもエクスポートしておくと安全です。
        </div>
      </div>

      <div className="km-card">
        <div className="km-cardhead">店舗・当月設定</div>
        <div className="km-form">
          <Field label="店舗名"><input value={settings.storeName} onChange={set("storeName")} /></Field>
          <Field label="運営会社"><input value={settings.company} onChange={set("company")} /></Field>
          <Field label="当月営業日数"><input type="number" value={settings.businessDays} onChange={set("businessDays")} /></Field>
          <Field label="計画売上（円）"><input type="number" value={settings.planSales} onChange={set("planSales")} /></Field>
          <Field label="前月売上（税抜・円）"><input type="number" value={settings.prevSales} onChange={set("prevSales")} /></Field>
          <Field label="想定原価率" hint="空欄なら標準40.5%"><input type="number" step="0.001" placeholder="0.405" value={settings.assumedGenkaRate} onChange={set("assumedGenkaRate")} /></Field>
        </div>
        <div className="km-subhead">固定費（月額・税抜・円）</div>
        <div className="km-form">
          <Field label="社員給与（固定）"><input type="number" value={settings.fixedLabor} onChange={set("fixedLabor")} /></Field>
          <Field label="アルバイト1人当たり日額（円）" hint="既定 7,500"><input type="number" value={settings.partRate} onChange={set("partRate")} /></Field>
          <Field label="家賃"><input type="number" value={settings.rent} onChange={set("rent")} /></Field>
          <Field label="減価償却費"><input type="number" value={settings.depreciation} onChange={set("depreciation")} /></Field>
          <Field label="借入元金返済"><input type="number" value={settings.loanRepay} onChange={set("loanRepay")} /></Field>
          <Field label="ロイヤリティ率" hint="標準0.05"><input type="number" step="0.001" value={settings.royaltyRate} onChange={set("royaltyRate")} /></Field>
          <Field label="ロイヤリティ確定額（DS請求書・税抜）" hint="会社PL取込時のJ36に使用。空欄なら売上×率"><input type="number" value={settings.royaltyFixed} onChange={set("royaltyFixed")} /></Field>
        </div>
        <div className="km-note">
          これらは速報予測の固定費・売上連動費の見積りに使われ、月次突合フェーズで請求書の確定値に置き換えます。
        </div>
      </div>
    </div>
  );
}

// ============================== 前年比較・対目標 ==============================
function YoY({ history, setHistory, targets, setTargets, reports, setReports }) {
  const [msg, setMsg] = useState("");
  const [view, setView] = useState("month"); // day / month / year
  const [busy, setBusy] = useState(false);
  const [reflectMsg, setReflectMsg] = useState("");

  const onFiles = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setBusy(true); setMsg("");
    try {
      let added = 0;
      const map = {};
      for (const r of history) map[r.date] = r;
      for (const f of files) {
        const rows = await readAirmateCSV(f);
        for (const row of rows) { map[row.date] = row; added++; }
      }
      const merged = Object.values(map).sort((a, b) => (a.date < b.date ? -1 : 1));
      setHistory(merged);
      setMsg(`${files.length}ファイル / ${added}行を取り込みました（合計 ${merged.length}日分）`);
    } catch (err) {
      setMsg("取込エラー: " + err.message);
    } finally {
      setBusy(false);
      e.target.value = "";
    }
  };

  // 取込CSV(history)全期間を日報(reports)へ反映。
  // 税込売上(salesInc)と客数(guests)を入れ、消費税額は空のまま。
  // 既存日報がある日は税込売上・客数のみ上書きし、他項目は維持。
  const reflectToReports = () => {
    if (!history.length) return;
    setReports((prev) => {
      const map = {};
      for (const r of prev) map[r.date] = { ...r };
      let updated = 0, created = 0;
      for (const h of history) {
        if (!h.date) continue;
        const inc = Number(h.sales) || 0;
        const g = Number(h.guests) || 0;
        if (inc === 0 && g === 0) continue;
        if (map[h.date]) {
          map[h.date] = { ...map[h.date], salesInc: String(inc), guests: String(g) };
          updated++;
        } else {
          map[h.date] = { date: h.date, salesInc: String(inc), guests: String(g), buys: {} };
          created++;
        }
      }
      setReflectMsg(`日報へ反映しました（新規 ${created}日 / 上書き ${updated}日）。消費税額は空欄なので、税抜売上が必要な月は日報入力で補ってください。`);
      return Object.values(map).sort((a, b) => (a.date < b.date ? -1 : 1));
    });
  };

  // 当月の日報(reports)を history に重ねる。日報の税込売上・客数を当年データとして使う。
  // CSVより日報が新しい想定なので、当月分は日報優先で上書き。
  const mergedHistory = useMemo(() => {
    const map = {};
    for (const r of history) map[r.date] = { ...r };
    // 当月 = 日報の最新年月
    const repDates = reports.map((r) => r.date).filter(Boolean);
    const curYM = repDates.length ? ymOf(repDates.sort().reverse()[0]) : null;
    for (const r of reports) {
      if (!r.date) continue;
      if (curYM && ymOf(r.date) !== curYM) continue; // 当月分のみ反映
      const inc = Number(r.salesInc) || 0;
      const g = Number(r.guests) || 0;
      if (inc === 0 && g === 0) continue;
      const dow = WEEKDAY_JP[new Date(r.date + "T00:00:00").getDay()];
      const prevRow = map[r.date] || {};
      map[r.date] = { ...prevRow, date: r.date, sales: inc, guests: g, dow: prevRow.dow || dow, fromReport: true };
    }
    return Object.values(map).sort((a, b) => (a.date < b.date ? -1 : 1));
  }, [history, reports]);

  const byDate = useMemo(() => {
    const m = {}; for (const r of mergedHistory) m[r.date] = r; return m;
  }, [mergedHistory]);

  const prevYearDate = (d) => {
    const [y, m, day] = d.split("-");
    return `${Number(y) - 1}-${m}-${day}`;
  };

  // 曜日を求める（CSVのdowが無い場合の補完にも使用）
  const dowOf = (d) => {
    const r = byDate[d];
    if (r && r.dow) return r.dow;
    return WEEKDAY_JP[new Date(d + "T00:00:00").getDay()];
  };

  const monthLabel = (ym) => `${Number(ym.slice(0, 4))}年${Number(ym.slice(5, 7))}月`;
  // 月計の目標 = その月の日別手入力目標の合計（無ければ空）
  const sumManualDaily = (curArr, dailyTargets) => {
    let sum = 0, any = false;
    for (const r of curArr) {
      const v = dailyTargets[r.date];
      if (v != null && v !== "") { sum += Number(v) || 0; any = true; }
    }
    return any ? String(sum) : "";
  };

  function mkRow(key, dow, cur, prev, manualTarget) {
    const sum = (arr, f) => arr.reduce((s, x) => s + f(x), 0);
    const sales = sum(cur, (x) => x.sales);
    const guests = sum(cur, (x) => x.guests);
    const perGuest = guests > 0 ? sales / guests : 0;
    const pHasData = prev.length > 0;
    const pSales = pHasData ? sum(prev, (x) => x.sales) : sum(cur, (x) => x.lastSales || 0);
    const pGuests = pHasData ? sum(prev, (x) => x.guests) : 0;
    const pPer = pGuests > 0 ? pSales / pGuests : 0;
    const amTarget = sum(cur, (x) => x.target || 0);
    const target = manualTarget != null && manualTarget !== "" ? Number(manualTarget) : amTarget;
    return {
      key, dow, sales, guests, perGuest,
      target,
      salesYoY: pSales > 0 ? sales / pSales : null,
      salesDelta: pSales > 0 ? sales - pSales : null,
      guestsDelta: pHasData ? guests - pGuests : null,
      perDelta: pHasData && pPer > 0 ? perGuest - pPer : null,
      achieve: target > 0 ? sales / target : null,
      diff: target > 0 ? sales - target : null,
    };
  }

  // 日別: 月ごとに区切る（[{type:'header',ym}, {type:'row',...}, {type:'subtotal',...}]）
  // 月別: 年ごとに区切る（1月〜12月）
  const sections = useMemo(() => {
    if (mergedHistory.length === 0) return [];
    if (view === "day") {
      // 月でグループ化（新しい月が上）
      const byMonth = {};
      for (const r of mergedHistory) {
        const ym = ymOf(r.date);
        (byMonth[ym] = byMonth[ym] || []).push(r);
      }
      return Object.keys(byMonth).sort().reverse().map((ym) => {
        const rows = byMonth[ym].sort((a, b) => (a.date < b.date ? 1 : -1)).map((r) => {
          const prev = byDate[prevYearDate(r.date)];
          const row = mkRow(r.date, r.dow || dowOf(r.date), [r], prev ? [prev] : [], targets.daily[r.date]);
          row.tkey = r.date; row.tscope = "daily";
          return row;
        });
        // 月計
        const curArr = byMonth[ym];
        const prevArr = curArr.map((r) => byDate[prevYearDate(r.date)]).filter(Boolean);
        const sub = mkRow(monthLabel(ym) + " 計", "", curArr, prevArr, sumManualDaily(curArr, targets.daily));
        return { ym, label: monthLabel(ym), rows, sub };
      });
    }
    if (view === "month") {
      // 年でグループ化（1月〜12月の順、新しい年が上）
      const byYear = {};
      for (const r of mergedHistory) {
        const y = yOf(r.date);
        (byYear[y] = byYear[y] || []).push(r);
      }
      return Object.keys(byYear).sort().reverse().map((y) => {
        // その年の月リスト（1月→12月）
        const monthsInYear = {};
        for (const r of byYear[y]) {
          const ym = ymOf(r.date);
          (monthsInYear[ym] = monthsInYear[ym] || []).push(r);
        }
        const rows = Object.keys(monthsInYear).sort().map((ym) => {
          const cur = monthsInYear[ym];
          const prevYM = `${Number(y) - 1}${ym.slice(4)}`;
          const prev = mergedHistory.filter((r) => ymOf(r.date) === prevYM);
          const row = mkRow(monthLabel(ym), "", cur, prev, targets.monthly[ym]);
          row.tkey = ym; row.tscope = "monthly";
          return row;
        });
        // 年計
        const curArr = byYear[y];
        const prevArr = mergedHistory.filter((r) => yOf(r.date) === String(Number(y) - 1));
        const sub = mkRow(y + "年 計", "", curArr, prevArr, targets.yearly[y]);
        return { ym: y, label: y + "年", rows, sub };
      });
    }
    // 年ビュー（従来通り、年ごと1行）
    const byYear = {};
    for (const r of mergedHistory) {
      const y = yOf(r.date);
      (byYear[y] = byYear[y] || []).push(r);
    }
    const rows = Object.keys(byYear).sort().reverse().map((y) => {
      const cur = byYear[y];
      const prev = byYear[String(Number(y) - 1)] || [];
      const row = mkRow(y + "年", "", cur, prev, targets.yearly[y]);
      row.tkey = y; row.tscope = "yearly";
      return row;
    });
    return [{ ym: "all", label: "", rows, sub: null }];
  }, [mergedHistory, view, byDate, targets]);

  const setTarget = (scope, key) => (e) => {
    const v = e.target.value;
    setTargets((t) => ({ ...t, [scope]: { ...t[scope], [key]: v } }));
  };

  return (
    <div className="km-page">
      <div className="km-card">
        <div className="km-cardhead">エアメイトCSV取込</div>
        <div className="km-note" style={{ marginTop: 0, marginBottom: 12 }}>
          エアメイトの「日次サマリ」または「日別売上月報」CSV（Shift-JIS可）を選択します。形式は自動判別します。
          当年・前年の両方を取り込むと、客数・客単価の前年比も日付マッチングで算出します。同じ日付は新しい取込で上書きされます。
        </div>
        <label className="km-upload">
          <input type="file" accept=".csv" multiple onChange={onFiles} disabled={busy} />
          <span>{busy ? "取込中…" : "CSVファイルを選択（複数可）"}</span>
        </label>
        {msg && <div className="km-msg">{msg}</div>}

        {history.length > 0 && (
          <div className="km-reflect">
            <div className="km-reflect-head">取込CSVを日報へ反映</div>
            <div className="km-note" style={{ marginTop: 0, marginBottom: 10 }}>
              取り込んだCSV全期間（{history.length}日分）の<b>税込売上・客数</b>を日報に書き込みます。
              消費税額は空欄のまま入るので、税抜売上が必要な月は後から日報入力で消費税額を補ってください。
              既存の日報がある日は税込売上・客数のみ上書きし、消費税額・仕入などの他項目は残します。
            </div>
            <button className="km-reflect-btn" onClick={reflectToReports}>
              CSV全期間を日報へ反映する
            </button>
            {reflectMsg && <div className="km-msg">{reflectMsg}</div>}
          </div>
        )}
      </div>

      {mergedHistory.length === 0 ? (
        <Empty title="まだ取込データがありません" body="上のボタンからエアメイトのCSVを取り込むか、日報を入力すると、前年比・対目標がここに表示されます。" />
      ) : (
        <div className="km-card">
          <div className="km-cardhead-row">
            <div className="km-cardhead">前年比較・対目標</div>
            <div className="km-seg">
              {[["day", "日"], ["month", "月"], ["year", "年"]].map(([k, l]) => (
                <button key={k} className={"km-segbtn" + (view === k ? " on" : "")} onClick={() => setView(k)}>{l}</button>
              ))}
            </div>
          </div>

          <div className="km-tablewrap">
            <table className="km-table yoy">
              <thead>
                <tr>
                  <th>{view === "day" ? "日付" : view === "month" ? "月" : "年"}</th>
                  <th className="r">売上</th>
                  <th className="r">前年比</th>
                  <th className="r">前年差</th>
                  <th className="r">客数</th>
                  <th className="r">前年差</th>
                  <th className="r">客単価</th>
                  <th className="r">前年差</th>
                  <th className="r">目標</th>
                  <th className="r">達成率</th>
                  <th className="r">差分</th>
                </tr>
              </thead>
              <tbody>
                {sections.map((sec) => (
                  <React.Fragment key={sec.ym}>
                    {sec.label && (
                      <tr className="km-secdiv">
                        <td colSpan={11}>{sec.label}</td>
                      </tr>
                    )}
                    {sec.rows.map((p) => (
                      <tr key={p.key}>
                        <td className="mono nowrap">{p.key}{p.dow ? `(${p.dow})` : ""}</td>
                        <td className="r mono">{yen(p.sales)}</td>
                        <td className={"r mono " + yoyCls(p.salesYoY)}>{yoyTxt(p.salesYoY)}</td>
                        <td className={"r mono " + deltaCls(p.salesDelta)}>{deltaYen(p.salesDelta)}</td>
                        <td className="r mono">{p.guests.toLocaleString()}</td>
                        <td className={"r mono " + deltaCls(p.guestsDelta)}>{deltaNum(p.guestsDelta, "人")}</td>
                        <td className="r mono">{yen(p.perGuest)}</td>
                        <td className={"r mono " + deltaCls(p.perDelta)}>{deltaYen(p.perDelta)}</td>
                        <td className="r">
                          <input className="km-tgt" type="number" placeholder={p.target || "0"}
                            value={targets[p.tscope][p.tkey] ?? ""} onChange={setTarget(p.tscope, p.tkey)} />
                        </td>
                        <td className={"r mono " + (p.achieve >= 1 ? "pos" : p.achieve != null ? "neg" : "")}>{pct(p.achieve)}</td>
                        <td className={"r mono " + (p.diff >= 0 ? "pos" : p.diff != null ? "neg" : "")}>{p.diff != null ? (p.diff >= 0 ? "+" : "") + yen(p.diff) : "—"}</td>
                      </tr>
                    ))}
                    {sec.sub && (
                      <tr className="em">
                        <td className="nowrap">{sec.sub.key}</td>
                        <td className="r mono">{yen(sec.sub.sales)}</td>
                        <td className={"r mono " + yoyCls(sec.sub.salesYoY)}>{yoyTxt(sec.sub.salesYoY)}</td>
                        <td className={"r mono " + deltaCls(sec.sub.salesDelta)}>{deltaYen(sec.sub.salesDelta)}</td>
                        <td className="r mono">{sec.sub.guests.toLocaleString()}</td>
                        <td className={"r mono " + deltaCls(sec.sub.guestsDelta)}>{deltaNum(sec.sub.guestsDelta, "人")}</td>
                        <td className="r mono">{yen(sec.sub.perGuest)}</td>
                        <td className={"r mono " + deltaCls(sec.sub.perDelta)}>{deltaYen(sec.sub.perDelta)}</td>
                        <td className="r mono">{sec.sub.target > 0 ? yen(sec.sub.target) : "—"}</td>
                        <td className={"r mono " + (sec.sub.achieve >= 1 ? "pos" : sec.sub.achieve != null ? "neg" : "")}>{pct(sec.sub.achieve)}</td>
                        <td className={"r mono " + (sec.sub.diff >= 0 ? "pos" : sec.sub.diff != null ? "neg" : "")}>{sec.sub.diff != null ? (sec.sub.diff >= 0 ? "+" : "") + yen(sec.sub.diff) : "—"}</td>
                      </tr>
                    )}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
          </div>
          <div className="km-note">
            当月分は日報の入力値（税込売上・客数）を反映しています。「—」は前年同期間のデータ未取込を示します。
            目標欄は手入力で上書きでき、空欄ならエアメイトの売上目標を使います。
          </div>
        </div>
      )}
    </div>
  );
}

function yoyTxt(r) {
  if (r == null || !isFinite(r)) return "—";
  return (r >= 1 ? "+" : "") + ((r - 1) * 100).toFixed(1) + "%";
}
function yoyCls(r) {
  if (r == null || !isFinite(r)) return "dim";
  return r >= 1 ? "pos" : "neg";
}
function deltaYen(n) {
  if (n == null || !isFinite(n)) return "—";
  return (n >= 0 ? "+" : "−") + "¥" + Math.abs(Math.round(n)).toLocaleString("ja-JP");
}
function deltaNum(n, unit) {
  if (n == null || !isFinite(n)) return "—";
  return (n >= 0 ? "+" : "−") + Math.abs(Math.round(n)).toLocaleString("ja-JP") + (unit || "");
}
function deltaCls(n) {
  if (n == null || !isFinite(n)) return "dim";
  return n >= 0 ? "pos" : "neg";
}

function Empty({ title, body }) {
  return (
    <div className="km-page">
      <div className="km-card empty">
        <div className="km-empty-title">{title}</div>
        <div className="km-empty-body">{body}</div>
      </div>
    </div>
  );
}
